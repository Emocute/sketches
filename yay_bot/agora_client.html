<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>yay_bot Agora client</title>
<!-- 全面API移行(2026-06-03): Yay通話のAgoraチャンネルに直接入る。
     RTC=音楽publisher(BlackHole経路を廃止し音質◎)、RTM=通話チャット読/送。
     SDKはnode_modules(UMD)からfile://でロード。Node側(lib/agora.mjs)がCDPでこのページを操作する。 -->
<script src="./node_modules/agora-rtc-sdk-ng/AgoraRTC_N-production.js"></script>
<script src="./node_modules/agora-rtm-sdk/agora-rtm.js"></script>
</head>
<body>
<pre id="log">yay_bot agora client ready</pre>
<script>
(() => {
  const S = {
    appId: null, channel: null, uid: null,
    rtc: null, rtm: null, rtmChannel: null,
    musicTrack: null, joinedRtc: false, joinedRtm: false,
    nowPlaying: null, log: [], inbox: [], errors: [],
    remoteTracks: new Map(),  // uid → IRemoteAudioTrack（聞き取り用）
    utterances: [],           // 切り出した発話 {b64,rate,ms}（Node が drain）
    listen: { on: false, ctx: null, bus: null, proc: null, sources: new Map(), buf: [], voiced: false, hold: 0, srcRate: 48000, thresh: 0.012 },
  };
  window.__yay = S;
  const logEl = document.getElementById('log');
  const L = (...a) => {
    const line = a.map((x) => (typeof x === 'object' ? JSON.stringify(x) : String(x))).join(' ');
    S.log.push(`${Date.now()} ${line}`);
    if (S.log.length > 500) S.log.splice(0, S.log.length - 500);
    logEl.textContent = S.log.slice(-40).join('\n');
    console.log('[yay]', line);
  };
  const err = (stage, e) => { const m = `${stage}: ${e?.message || e}`; S.errors.push(m); L('ERR', m); return m; };

  // ===== RTC（音楽 publisher）=====
  async function joinRtc({ appId, channel, rtcToken, uid }) {
    S.appId = appId; S.channel = channel; S.uid = uid;
    AgoraRTC.setLogLevel(2);
    // 通話は communication。音声のみ publish。
    // ※codec は映像コーデック指定欄（vp8/vp9/av1/h264/h265 のみ）。音声onlyでも有効値が必須。
    //   'opus' を渡すと INVALID_PARAMS。音声publishには既定の vp8 でよい（映像は使わない）。
    S.rtc = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
    S.rtc.on('user-published', async (user, mediaType) => {
      L('remote published', user.uid, mediaType);
      if (mediaType !== 'audio') return;
      // 聞き取り用に購読する。★.play() は呼ばない＝スピーカー出力しない（Yay出力→BlackHoleへの
      //   ハウリング/自分の音楽との混線を防ぐ）。WebAudio で解析だけする。
      try {
        await S.rtc.subscribe(user, 'audio');
        S.remoteTracks.set(String(user.uid), user.audioTrack);
        if (S.listen.on) attachRemote(String(user.uid), user.audioTrack);
        if (S.rec) recAttach(String(user.uid), user.audioTrack);   // 録音中なら新規参加者も録る
      } catch (e) { err('subscribe', e); }
    });
    S.rtc.on('user-unpublished', (user, mediaType) => {
      if (mediaType === 'audio') { detachRemote(String(user.uid)); recDetach(String(user.uid)); S.remoteTracks.delete(String(user.uid)); }
    });
    S.rtc.on('user-left', (user) => { detachRemote(String(user.uid)); recDetach(String(user.uid)); S.remoteTracks.delete(String(user.uid)); });
    S.rtc.on('exception', (ev) => L('rtc exception', ev.code, ev.msg));
    S.rtc.on('connection-state-change', (cur, prev, reason) => L('rtc state', prev, '→', cur, reason || ''));
    // ★uid は conference_call_user_uuid（文字列アカウント）。RTCトークンの crc_uid が
    //   この uuid の CRC32 に一致（2026-06-03 実走で確認）。Number()せず文字列のまま渡す
    //   ＝Agora 文字列ユーザーアカウントで join。数値化すると NaN→ランダムuid→authorized failed。
    const joinedUid = await S.rtc.join(appId, channel, rtcToken || null, uid || null);
    S.joinedRtc = true;
    L('RTC joined', 'channel=' + channel, 'uid=' + joinedUid);
    return { ok: true, uid: joinedUid };
  }

  // ===== 配信ミックスバス（音楽 + TTS を 1 本にまとめて publish）=====
  // 設計（2026-06-04）: 旧来は playUrl が毎回 stopMusic→新トラックpublish だったので、
  //   TTS(読み上げ)が音楽トラックを丸ごと置換→BGMが消える事故になっていた。
  //   解: WebAudio の MediaStreamDestination を 1 本だけ publish し、
  //   musicGain（曲）と ttsGain（読み上げ）を両方そこへ合流。TTS中は musicGain をダッキング。
  //   → 音楽を止めずに読み上げが乗る。音量は musicGain.gain で制御（Agora setVolume は使わない）。
  S.musicVol = (typeof S.musicVol === 'number') ? S.musicVol : 2;   // 既定音量（2026-06-07 究指示 15→2）
  S.ttsVol = (typeof S.ttsVol === 'number') ? S.ttsVol : 30;   // 読み上げ(ずんだもん声)音量。既定控えめ
  S.duck = (typeof S.duck === 'number') ? S.duck : 0.7;   // TTS中の音楽残し率（2026-06-07 0.25→0.7。下げすぎで音楽が消える対策）
  const volToGain = (v) => Math.max(0, Math.min(100, Number(v) || 0)) / 100;

  function ensurePublishBus() {
    if (S.pub) return S.pub;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dest = ctx.createMediaStreamDestination();
    const musicGain = ctx.createGain(); musicGain.gain.value = volToGain(S.musicVol);
    const ttsGain = ctx.createGain(); ttsGain.gain.value = volToGain(S.ttsVol);
    musicGain.connect(dest); ttsGain.connect(dest);
    const [mst] = dest.stream.getAudioTracks();
    const track = AgoraRTC.createCustomAudioTrack({ mediaStreamTrack: mst });
    try { track.setVolume(100); } catch {}   // バス自体は原音。音量制御は musicGain 側で行う
    S.pub = { ctx, dest, musicGain, ttsGain, track, published: false };
    L('publish bus created', 'srcRate=' + ctx.sampleRate);
    return S.pub;
  }
  async function ensurePublished() {
    if (!S.joinedRtc) throw new Error('RTC未参加');
    const p = ensurePublishBus();
    if (p.ctx.state === 'suspended') { try { await p.ctx.resume(); } catch {} }
    if (!p.published) { await S.rtc.publish([p.track]); p.published = true; L('▶ bus published'); }
    return p;
  }

  // 音量 0〜100（100=原音）。既定は控えめに 15。musicGain を直接動かす。
  function setLoop(on) { S.loop = (typeof on === 'boolean') ? on : !S.loop; if (S.audioEl) S.audioEl.loop = S.loop; L('loop', S.loop); return { ok: true, loop: S.loop }; }
  function setMusicVolume(v) {
    let n = Number(v); if (!isFinite(n)) return { ok: false, error: 'NaN' };
    n = Math.max(0, Math.min(100, Math.round(n)));
    S.musicVol = n;
    if (S.pub && !S.ducking) S.pub.musicGain.gain.value = volToGain(n);
    L('vol', n);
    return { ok: true, vol: n };
  }
  // 読み上げ(ずんだもん声)の音量 0〜100。ttsGain を直接動かす（音楽とは独立）。
  function setTtsVolume(v) {
    let n = Number(v); if (!isFinite(n)) return { ok: false, error: 'NaN' };
    n = Math.max(0, Math.min(100, Math.round(n)));
    S.ttsVol = n;
    if (S.pub) S.pub.ttsGain.gain.value = volToGain(n);
    L('ttsvol', n);
    return { ok: true, vol: n };
  }
  // ダッキング率 0〜100(%) または 0〜1。TTS中に音楽を「残す」割合（100=下げない）。
  //   ducking 中なら即反映（耳で調整できる）。
  function setDuck(v) {
    let n = Number(v); if (!isFinite(n)) return { ok: false, error: 'NaN' };
    if (n > 1) n = n / 100;
    n = Math.max(0, Math.min(1, n));
    S.duck = n;
    if (S.ducking && S.pub) S.pub.musicGain.gain.value = volToGain(S.musicVol) * S.duck;
    L('duck', S.duck);
    return { ok: true, duck: Math.round(S.duck * 100) };
  }

  // 音楽ソースだけを止める（バス publish は保持＝TTSは引き続き流せる）。
  function stopMusicSource() {
    try { S.musicNode?.disconnect(); } catch {}
    try { if (S.audioEl) { S.audioEl.pause(); S.audioEl.src = ''; } } catch {}
    try { S.liveStream?.getTracks().forEach((t) => t.stop()); } catch {}
    S.musicNode = null; S.audioEl = null; S.liveStream = null; S.nowPlaying = null;
  }

  // /play: URL(ローカルproxy経由の直リンク)を <audio> で progressive 再生し、
  //   MediaElementSource で musicGain に合流。全DLせず即流れる＝real-time。
  async function playUrl(url, { loop = false } = {}) {
    const p = await ensurePublished();
    stopMusicSource();
    const a = new Audio();
    a.crossOrigin = 'anonymous';   // proxyがCORS付与＝MediaElementSourceがtaintされない
    a.preload = 'auto'; a.loop = loop; a.src = url;
    S.audioEl = a;
    await new Promise((res, rej) => {
      const ok = () => { cleanup(); res(); };
      const ng = () => { cleanup(); rej(new Error('audio読込失敗: ' + (a.error?.code || '?'))); };
      const cleanup = () => { a.removeEventListener('canplay', ok); a.removeEventListener('error', ng); };
      a.addEventListener('canplay', ok); a.addEventListener('error', ng);
      setTimeout(ok, 8000); // canplay来なくても8秒で見切り発車（progressiveなので流れ始める）
    });
    const node = p.ctx.createMediaElementSource(a);
    node.connect(p.musicGain);
    S.musicNode = node;
    await a.play();
    a.addEventListener('ended', () => { if (!a.loop) { L('music ended'); stopMusicSource(); } });
    S.nowPlaying = url;
    L('▶ music', url, 'vol=' + S.musicVol);
    return { ok: true, label: url, vol: S.musicVol };
  }

  // /live: システム音声入力（BlackHole等）を getUserMedia で掴んで musicGain に合流。
  async function playLive(match) {
    const p = await ensurePublished();
    stopMusicSource();
    let constraints = { audio: true };
    if (match) {
      const devs = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === 'audioinput');
      const hit = devs.find((d) => new RegExp(match, 'i').test(d.label));
      if (hit) constraints = { audio: { deviceId: { exact: hit.deviceId } } };
      else L('playLive: 該当入力なし match=' + match + ' / 既定入力を使用');
    }
    const ms = await navigator.mediaDevices.getUserMedia(constraints);
    const [mst] = ms.getAudioTracks();
    if (!mst) throw new Error('getUserMedia: 音声トラック無し');
    const node = p.ctx.createMediaStreamSource(ms);
    node.connect(p.musicGain);
    S.liveStream = ms; S.musicNode = node;
    S.nowPlaying = 'live:' + (mst.label || match || 'default');
    L('▶ live', S.nowPlaying, 'vol=' + S.musicVol);
    return { ok: true, label: S.nowPlaying, vol: S.musicVol };
  }

  // 読み上げ(TTS): WAV(ローカルproxy)を ttsGain に乗せて喋らせる。再生中は音楽をダッキング。
  //   音楽トラックは触らない＝BGMが消えない。再生完了で resolve（Node が await できる）。
  async function playTTS(url) {
    const p = await ensurePublished();
    return new Promise(async (resolve) => {
      const a = new Audio();
      a.crossOrigin = 'anonymous';
      a.src = url;
      let node = null, done = false;
      const restore = (why) => {
        if (done) return; done = true;
        try { node?.disconnect(); } catch {}
        S.ducking = false;
        p.musicGain.gain.value = volToGain(S.musicVol);   // 現在設定の音量へ復帰
        S.ttsEl = null;
        L('🗣 tts end', why || '');
        resolve({ ok: true });
      };
      try {
        await new Promise((res, rej) => {
          const ok = () => { a.removeEventListener('canplay', ok); a.removeEventListener('error', ng); res(); };
          const ng = () => { a.removeEventListener('canplay', ok); a.removeEventListener('error', ng); rej(new Error('tts読込失敗')); };
          a.addEventListener('canplay', ok); a.addEventListener('error', ng);
          setTimeout(ok, 5000);
        });
        node = p.ctx.createMediaElementSource(a);
        node.connect(p.ttsGain);
        S.ttsEl = a;
        // ダッキング: 音楽を duck 率まで下げる
        S.ducking = true;
        p.musicGain.gain.value = volToGain(S.musicVol) * S.duck;
        a.addEventListener('ended', () => restore('ended'));
        a.addEventListener('error', () => restore('error'));
        await a.play();
        L('🗣 tts play', url.slice(-40));
        setTimeout(() => restore('timeout'), 20000);  // 保険（max20s）
      } catch (e) { err('playTTS', e); restore('exc'); }
    });
  }

  async function listAudioInputs() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    return devs.filter((d) => d.kind === 'audioinput').map((d) => ({ id: d.deviceId, label: d.label }));
  }

  // /stop /skip 用: 音楽ソースを止める（バスは publish 継続＝TTS は生きる）。
  async function stopMusic() {
    stopMusicSource();
    L('⏸ stop music');
    return { ok: true };
  }
  function pauseMusic() { try { S.audioEl?.pause(); } catch {} L('pause'); return { ok: !!S.audioEl }; }
  function resumeMusic() { try { S.audioEl?.play(); } catch {} L('resume'); return { ok: !!S.audioEl }; }

  // ===== 通話音声の聞き取り（remote audio → 16k mono PCM → Node が whisper へ）=====
  // 設計: 各 remote の音声トラックを WebAudio の mix bus に集約 → ScriptProcessor で RMS-VAD。
  //   発話区間だけ切り出し 16kHz mono Int16 に変換 → base64 で S.utterances に積む。Node が drain。
  //   ★destination には繋ぐが出力は書かない（無音）＝スピーカーに漏らさない。
  function resampleTo16k(input, inRate) {
    if (inRate === 16000) return input;
    const ratio = inRate / 16000;
    const outLen = Math.floor(input.length / ratio);
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const idx = i * ratio, i0 = Math.floor(idx), i1 = Math.min(i0 + 1, input.length - 1), f = idx - i0;
      out[i] = input[i0] * (1 - f) + input[i1] * f;
    }
    return out;
  }
  // ★話者別VAD（2026-06-07）: remote ごとに ScriptProcessor+VAD を持たせ、発話に uid を付ける。
  //   旧: 全員を1本のbusに混ぜて区切る→誰の声か不明。新: source 単位で区切り {b64,rate,ms,uid}。
  //   Node 側が uid(=conference_call_user_uuid) を chat で学習した名前に解決して「○○（声）」にする。
  function flushUtterance(uid, st) {
    if (!st.buf.length) { st.voiced = false; st.hold = 0; return; }
    let total = 0; for (const f of st.buf) total += f.length;
    const pcm = new Float32Array(total); let o = 0; for (const f of st.buf) { pcm.set(f, o); o += f.length; }
    st.buf.length = 0; st.voiced = false; st.hold = 0;
    const out16 = resampleTo16k(pcm, S.listen.srcRate);
    const ms = Math.round(out16.length / 16000 * 1000);
    if (ms < 350) return;  // 短すぎる雑音は捨てる
    const i16 = new Int16Array(out16.length);
    for (let i = 0; i < out16.length; i++) { let s = Math.max(-1, Math.min(1, out16[i])); i16[i] = s < 0 ? s * 0x8000 : s * 0x7fff; }
    const bytes = new Uint8Array(i16.buffer); let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    S.utterances.push({ b64: btoa(bin), rate: 16000, ms, uid: String(uid) });
    if (S.utterances.length > 30) S.utterances.shift();
    L('utterance', uid, ms + 'ms', 'q=' + S.utterances.length);
  }
  function ensureListenCtx() {
    if (S.listen.ctx) return;
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    S.listen.ctx = ctx; S.listen.srcRate = ctx.sampleRate;
    L('listen ctx', 'srcRate=' + ctx.sampleRate);
  }
  function attachRemote(uid, track) {
    try {
      ensureListenCtx();
      if (S.listen.sources.has(String(uid))) return;   // 二重 attach 防止
      const ctx = S.listen.ctx;
      const mst = track.getMediaStreamTrack();
      const src = ctx.createMediaStreamSource(new MediaStream([mst]));
      const proc = ctx.createScriptProcessor(4096, 1, 1);
      const st = { buf: [], voiced: false, hold: 0 };   // この話者専用の VAD 状態
      const HOLD_MAX = 8;                                // 無音が約0.68s続いたら区切る
      proc.onaudioprocess = (e) => {
        if (!S.listen.on) return;
        const ch = e.inputBuffer.getChannelData(0);
        let sum = 0; for (let i = 0; i < ch.length; i++) sum += ch[i] * ch[i];
        const rms = Math.sqrt(sum / ch.length);
        const THRESH = Number(S.listen.thresh) || 0.012;
        if (rms >= THRESH) { st.voiced = true; st.hold = 0; st.buf.push(new Float32Array(ch)); }
        else if (st.voiced) { st.hold++; st.buf.push(new Float32Array(ch)); if (st.hold >= HOLD_MAX) flushUtterance(uid, st); }
        if (st.voiced) { let tot = 0; for (const f of st.buf) tot += f.length; if (tot > S.listen.srcRate * 12) flushUtterance(uid, st); }  // 暴走防止12s上限
      };
      src.connect(proc); proc.connect(ctx.destination);   // proc は無音出力（outを書かない）
      S.listen.sources.set(String(uid), { src, proc, st });
      L('listen attach', uid, 'n=' + S.listen.sources.size);
    } catch (e) { err('attachRemote', e); }
  }
  function detachRemote(uid) {
    const e = S.listen.sources.get(String(uid));
    if (e) { try { flushUtterance(String(uid), e.st); } catch {} try { e.src.disconnect(); e.proc.disconnect(); } catch {} S.listen.sources.delete(String(uid)); L('listen detach', uid); }
  }
  function startListen(opts) {
    ensureListenCtx();
    if (opts && typeof opts.thresh === 'number') S.listen.thresh = opts.thresh;
    if (S.listen.ctx.state === 'suspended') S.listen.ctx.resume();
    S.listen.on = true;
    for (const [uid, track] of S.remoteTracks) if (!S.listen.sources.has(uid)) attachRemote(uid, track);
    L('👂 listen ON', 'sources=' + S.listen.sources.size);
    return { ok: true, sources: S.listen.sources.size };
  }
  function stopListen() {
    S.listen.on = false;
    for (const [uid, e] of S.listen.sources) { try { e.src.disconnect(); e.proc.disconnect(); } catch {} }
    S.listen.sources.clear();
    L('listen OFF');
    return { ok: true };
  }
  function drainUtterances() { const x = S.utterances.slice(); S.utterances.length = 0; return x; }

  // ===== 録音（通話の全員の声 + 自分が流す音楽を 1 本にミックス → MediaRecorder）=====
  // 専用 AudioContext で remoteTracks と publish bus の出力ストリームを合流し webm/opus を吐く。
  // Node 側が drainRecChunks で base64 チャンクを逐次回収しファイルへ追記（長時間でもメモリ安全）。
  function recAttach(uid, track) {
    if (!S.rec) return;
    try {
      const mst = track.getMediaStreamTrack();
      const src = S.rec.ctx.createMediaStreamSource(new MediaStream([mst]));
      src.connect(S.rec.mix); S.rec.sources.set(uid, src);
    } catch (e) { err('recAttach', e); }
  }
  function recDetach(uid) {
    if (!S.rec) return;
    const s = S.rec.sources.get(uid);
    if (s) { try { s.disconnect(); } catch {} S.rec.sources.delete(uid); }
  }
  async function startRecord() {
    if (S.rec) return { ok: false, reason: '既に録音中' };
    const Ctx = window.AudioContext || window.webkitAudioContext;
    const ctx = new Ctx();
    const mix = ctx.createGain(); mix.gain.value = 1;
    const dest = ctx.createMediaStreamDestination();
    mix.connect(dest);
    S.rec = { ctx, mix, dest, sources: new Map(), pending: [], rec: null, musicSrc: null, mime: '' };
    for (const [uid, track] of S.remoteTracks) recAttach(uid, track);   // 今居る全参加者
    try { if (S.pub?.dest?.stream) { const m = ctx.createMediaStreamSource(S.pub.dest.stream); m.connect(mix); S.rec.musicSrc = m; } } catch (e) { err('rec music', e); }
    const mime = (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) ? 'audio/webm;codecs=opus' : 'audio/webm';
    const mr = new MediaRecorder(dest.stream, { mimeType: mime, audioBitsPerSecond: 128000 });
    S.rec.mime = mime;
    mr.ondataavailable = (e) => {
      if (!e.data || !e.data.size) return;
      const r = new FileReader();
      r.onload = () => { if (S.rec) S.rec.pending.push(String(r.result).split(',')[1]); };
      r.readAsDataURL(e.data);
    };
    mr.start(3000);   // 3秒ごとにチャンク
    S.rec.rec = mr;
    L('● record start', mime);
    return { ok: true, mime };
  }
  function drainRecChunks() { if (!S.rec) return []; const x = S.rec.pending.slice(); S.rec.pending.length = 0; return x; }
  async function stopRecord() {
    if (!S.rec) return { ok: false, reason: '録音してない' };
    const r = S.rec;
    await new Promise((res) => { r.rec.onstop = res; try { r.rec.stop(); } catch { res(); } });
    await new Promise((res) => setTimeout(res, 300));   // FileReader コールバック待ち
    const rest = r.pending.slice();
    try { r.sources.forEach((s) => s.disconnect()); r.musicSrc?.disconnect(); r.mix.disconnect(); await r.ctx.close(); } catch {}
    S.rec = null;
    L('■ record stop');
    return { ok: true, chunks: rest, mime: r.mime };
  }
  function recStatus() { return { on: !!S.rec, sources: S.rec ? S.rec.sources.size : 0, queued: S.rec ? S.rec.pending.length : 0 }; }

  // ===== RTM（通話チャット）=====
  // 注意: Yay通話チャットのRTMチャンネル名・メッセージ形式は実通話で要発見（スパイク）。
  // 既定では RTC と同じ channel 名を購読し、来た生メッセージを inbox/log に貯める。
  async function joinRtm({ appId, uid, rtmUid, rtmToken, channel }) {
    const RTMNS = window.AgoraRTM || {};
    const RTMCtor = RTMNS.RTM || (RTMNS.default && RTMNS.default.RTM);
    if (!RTMCtor) throw new Error('AgoraRTM SDK未ロード');
    // ★RTM の userId は Yay uid ではなく conference_call_user_uuid（RTMトークンの束縛先）。
    //   2026-06-03 実走: 007トークンに uuid が埋まってて、uid で login すると署名検証失敗(-10005)。
    const ruid = String(rtmUid || uid);
    S.rtm = new RTMCtor(appId, ruid, { token: rtmToken });
    S._rtmToken = rtmToken;
    S.rtm.addEventListener('status', (e) => L('rtm status', e.state, e.reason || ''));
    S.rtm.addEventListener('message', (e) => {
      // e: { channelName, channelType, publisher, message, messageType, ... }
      const m = { ts: Date.now(), channel: e.channelName, type: e.channelType, publisher: e.publisher, message: e.message, messageType: e.messageType };
      S.inbox.push(m);
      if (S.inbox.length > 500) S.inbox.splice(0, S.inbox.length - 500);
      L('RTM msg', e.publisher, '@' + e.channelName, typeof e.message === 'string' ? e.message.slice(0, 80) : '[non-string]');
    });
    // ★token は login() に渡す必須（constructor だけだと static key 扱いで
    //   -10005 DYNAMIC_ENABLED_BUT_STATIC_KEY になる。2026-06-03 実走で判明）。
    await S.rtm.login({ token: rtmToken });
    S.joinedRtm = true;
    S.rtmChannel = channel;
    // MESSAGE チャンネルとして購読（通話チャットは message チャンネル想定）
    await S.rtm.subscribe(channel, { withMessage: true, withPresence: true, withMetadata: false });
    L('RTM joined+subscribed', channel);
    return { ok: true, channel };
  }
  async function sendChat(text) {
    if (!S.joinedRtm || !S.rtmChannel) throw new Error('RTM未参加');
    await S.rtm.publish(S.rtmChannel, String(text), { channelType: 'MESSAGE' });
    L('→ RTM send', String(text).slice(0, 80));
    return { ok: true };
  }

  // ===== Node から呼ぶ公開 API =====
  window.YayAgora = {
    join: async (creds) => {
      const out = { rtc: null, rtm: null };
      try { out.rtc = await joinRtc(creds); } catch (e) { out.rtc = { ok: false, error: err('joinRtc', e) }; }
      // RTM チャンネル名は creds.rtmChannel があればそれ、無ければ RTC channel を流用（発見対象）
      try { out.rtm = await joinRtm({ appId: creds.appId, uid: creds.uid, rtmUid: creds.rtmUid || creds.conference_call_user_uuid, rtmToken: creds.rtmToken || creds.rtm_token, channel: creds.rtmChannel || creds.channel }); }
      catch (e) { out.rtm = { ok: false, error: err('joinRtm', e) }; }
      return out;
    },
    playUrl, playLive, playTTS, listAudioInputs, setMusicVolume, setTtsVolume, setDuck, setLoop, stopMusic, pauseMusic, resumeMusic, sendChat,
    startListen, stopListen, drainUtterances, listenStatus: () => ({ on: S.listen.on, sources: S.listen.sources.size, queued: S.utterances.length, srcRate: S.listen.srcRate }),
    startRecord, stopRecord, drainRecChunks, recStatus,
    // Node が polling で吸う
    drainInbox: () => { const x = S.inbox.slice(); S.inbox.length = 0; return x; },
    peekInbox: () => S.inbox.slice(),
    status: () => ({ joinedRtc: S.joinedRtc, joinedRtm: S.joinedRtm, channel: S.channel, rtmChannel: S.rtmChannel, uid: S.uid, nowPlaying: S.nowPlaying, errors: S.errors.slice(-10), inbox: S.inbox.length }),
    tail: (n = 60) => S.log.slice(-n),
    leave: async () => {
      try { stopMusicSource(); } catch {}
      try { if (S.pub) { if (S.pub.published) await S.rtc?.unpublish([S.pub.track]); S.pub.track?.close?.(); await S.pub.ctx?.close?.(); S.pub = null; } } catch {}
      try { await S.rtc?.leave(); } catch {} try { await S.rtm?.logout(); } catch {}
      S.joinedRtc = S.joinedRtm = false; return { ok: true };
    },
  };
  L('YayAgora API ready', 'rtc=' + (typeof AgoraRTC !== 'undefined'), 'rtm=' + (typeof AgoraRTM !== 'undefined'));
})();
</script>
</body>
</html>
