<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>yay_bot Agora client</title>
<!-- 全面API移行(2026-06-03): Yay通話のAgoraチャンネルに直接入る。
     RTC=音楽publisher(BlackHole経路を廃止し音質◎)、RTM=通話チャット読/送。
     SDKはnode_modules(UMD)からfile://でロード。Node側(lib/agora.mjs)がCDPでこのページを操作する。 -->
<script src="./node_modules/agora-rtc-sdk-ng/AgoraRTC_N-production.js"></script>
<script src="./node_modules/agora-rtm-sdk/agora-rtm.js"></script>
</head>
<body>
<pre id="log">yay_bot agora client ready</pre>
<script>
(() => {
  const S = {
    appId: null, channel: null, uid: null,
    rtc: null, rtm: null, rtmChannel: null,
    musicTrack: null, joinedRtc: false, joinedRtm: false,
    nowPlaying: null, log: [], inbox: [], errors: [],
  };
  window.__yay = S;
  const logEl = document.getElementById('log');
  const L = (...a) => {
    const line = a.map((x) => (typeof x === 'object' ? JSON.stringify(x) : String(x))).join(' ');
    S.log.push(`${Date.now()} ${line}`);
    if (S.log.length > 500) S.log.splice(0, S.log.length - 500);
    logEl.textContent = S.log.slice(-40).join('\n');
    console.log('[yay]', line);
  };
  const err = (stage, e) => { const m = `${stage}: ${e?.message || e}`; S.errors.push(m); L('ERR', m); return m; };

  // ===== RTC（音楽 publisher）=====
  async function joinRtc({ appId, channel, rtcToken, uid }) {
    S.appId = appId; S.channel = channel; S.uid = uid;
    AgoraRTC.setLogLevel(2);
    // 通話は communication。音声のみ publish。
    // ※codec は映像コーデック指定欄（vp8/vp9/av1/h264/h265 のみ）。音声onlyでも有効値が必須。
    //   'opus' を渡すと INVALID_PARAMS。音声publishには既定の vp8 でよい（映像は使わない）。
    S.rtc = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
    S.rtc.on('user-published', async (user, mediaType) => {
      // 他参加者の音は購読しない（DJなので聞く必要なし＋CPU節約）。必要なら有効化。
      L('remote published', user.uid, mediaType);
    });
    S.rtc.on('exception', (ev) => L('rtc exception', ev.code, ev.msg));
    S.rtc.on('connection-state-change', (cur, prev, reason) => L('rtc state', prev, '→', cur, reason || ''));
    // ★uid は conference_call_user_uuid（文字列アカウント）。RTCトークンの crc_uid が
    //   この uuid の CRC32 に一致（2026-06-03 実走で確認）。Number()せず文字列のまま渡す
    //   ＝Agora 文字列ユーザーアカウントで join。数値化すると NaN→ランダムuid→authorized failed。
    const joinedUid = await S.rtc.join(appId, channel, rtcToken || null, uid || null);
    S.joinedRtc = true;
    L('RTC joined', 'channel=' + channel, 'uid=' + joinedUid);
    return { ok: true, uid: joinedUid };
  }

  // 共通: ライブ MediaStreamTrack を Agora custom track として publish（real-time配信の核）。
  async function publishLiveTrack(mst, label) {
    S.musicTrack = AgoraRTC.createCustomAudioTrack({ mediaStreamTrack: mst });
    await S.rtc.publish([S.musicTrack]);
    S.nowPlaying = label;
    L('▶ live publish', label);
    return { ok: true, label };
  }

  // /play: URL(ローカルproxy経由の直リンク)を <audio> で progressive 再生し、
  //   captureStream で生トラックを取って publish。全DLせず即流れる＝real-time。
  async function playUrl(url, { loop = false } = {}) {
    if (!S.joinedRtc) throw new Error('RTC未参加');
    await stopMusic();
    const a = new Audio();
    a.crossOrigin = 'anonymous';   // proxyがCORS付与＝captureStreamがtaintされない
    a.preload = 'auto'; a.loop = loop; a.src = url;
    S.audioEl = a;
    await new Promise((res, rej) => {
      const ok = () => { cleanup(); res(); };
      const ng = () => { cleanup(); rej(new Error('audio読込失敗: ' + (a.error?.code || '?'))); };
      const cleanup = () => { a.removeEventListener('canplay', ok); a.removeEventListener('error', ng); };
      a.addEventListener('canplay', ok); a.addEventListener('error', ng);
      setTimeout(ok, 8000); // canplay来なくても8秒で見切り発車（progressiveなので流れ始める）
    });
    await a.play();
    const stream = a.captureStream ? a.captureStream() : a.mozCaptureStream();
    const [mst] = stream.getAudioTracks();
    if (!mst) throw new Error('captureStream: 音声トラック無し');
    a.addEventListener('ended', () => { if (!a.loop) { L('music ended'); stopMusic().catch(() => {}); } });
    return publishLiveTrack(mst, url);
  }

  // /live: システム音声入力（BlackHole等）を getUserMedia で掴んで publish。yt-dlp不要・完全real-time。
  async function playLive(match) {
    if (!S.joinedRtc) throw new Error('RTC未参加');
    await stopMusic();
    let constraints = { audio: true };
    if (match) {
      const devs = (await navigator.mediaDevices.enumerateDevices()).filter((d) => d.kind === 'audioinput');
      const hit = devs.find((d) => new RegExp(match, 'i').test(d.label));
      if (hit) constraints = { audio: { deviceId: { exact: hit.deviceId } } };
      else L('playLive: 該当入力なし match=' + match + ' / 既定入力を使用');
    }
    const ms = await navigator.mediaDevices.getUserMedia(constraints);
    const [mst] = ms.getAudioTracks();
    if (!mst) throw new Error('getUserMedia: 音声トラック無し');
    return publishLiveTrack(mst, 'live:' + (mst.label || match || 'default'));
  }

  async function listAudioInputs() {
    const devs = await navigator.mediaDevices.enumerateDevices();
    return devs.filter((d) => d.kind === 'audioinput').map((d) => ({ id: d.deviceId, label: d.label }));
  }

  async function stopMusic() {
    if (!S.musicTrack && !S.audioEl) return { ok: true, idle: true };
    try { if (S.musicTrack) await S.rtc.unpublish([S.musicTrack]); } catch (e) { err('unpublish', e); }
    try { S.musicTrack?.close(); } catch {}
    try { if (S.audioEl) { S.audioEl.pause(); S.audioEl.src = ''; } } catch {}
    S.musicTrack = null; S.audioEl = null; S.nowPlaying = null;
    L('⏸ stop music');
    return { ok: true };
  }
  function pauseMusic() { try { S.audioEl?.pause(); } catch {} L('pause'); return { ok: !!S.audioEl }; }
  function resumeMusic() { try { S.audioEl?.play(); } catch {} L('resume'); return { ok: !!S.audioEl }; }

  // ===== RTM（通話チャット）=====
  // 注意: Yay通話チャットのRTMチャンネル名・メッセージ形式は実通話で要発見（スパイク）。
  // 既定では RTC と同じ channel 名を購読し、来た生メッセージを inbox/log に貯める。
  async function joinRtm({ appId, uid, rtmUid, rtmToken, channel }) {
    const RTMNS = window.AgoraRTM || {};
    const RTMCtor = RTMNS.RTM || (RTMNS.default && RTMNS.default.RTM);
    if (!RTMCtor) throw new Error('AgoraRTM SDK未ロード');
    // ★RTM の userId は Yay uid ではなく conference_call_user_uuid（RTMトークンの束縛先）。
    //   2026-06-03 実走: 007トークンに uuid が埋まってて、uid で login すると署名検証失敗(-10005)。
    const ruid = String(rtmUid || uid);
    S.rtm = new RTMCtor(appId, ruid, { token: rtmToken });
    S._rtmToken = rtmToken;
    S.rtm.addEventListener('status', (e) => L('rtm status', e.state, e.reason || ''));
    S.rtm.addEventListener('message', (e) => {
      // e: { channelName, channelType, publisher, message, messageType, ... }
      const m = { ts: Date.now(), channel: e.channelName, type: e.channelType, publisher: e.publisher, message: e.message, messageType: e.messageType };
      S.inbox.push(m);
      if (S.inbox.length > 500) S.inbox.splice(0, S.inbox.length - 500);
      L('RTM msg', e.publisher, '@' + e.channelName, typeof e.message === 'string' ? e.message.slice(0, 80) : '[non-string]');
    });
    // ★token は login() に渡す必須（constructor だけだと static key 扱いで
    //   -10005 DYNAMIC_ENABLED_BUT_STATIC_KEY になる。2026-06-03 実走で判明）。
    await S.rtm.login({ token: rtmToken });
    S.joinedRtm = true;
    S.rtmChannel = channel;
    // MESSAGE チャンネルとして購読（通話チャットは message チャンネル想定）
    await S.rtm.subscribe(channel, { withMessage: true, withPresence: true, withMetadata: false });
    L('RTM joined+subscribed', channel);
    return { ok: true, channel };
  }
  async function sendChat(text) {
    if (!S.joinedRtm || !S.rtmChannel) throw new Error('RTM未参加');
    await S.rtm.publish(S.rtmChannel, String(text), { channelType: 'MESSAGE' });
    L('→ RTM send', String(text).slice(0, 80));
    return { ok: true };
  }

  // ===== Node から呼ぶ公開 API =====
  window.YayAgora = {
    join: async (creds) => {
      const out = { rtc: null, rtm: null };
      try { out.rtc = await joinRtc(creds); } catch (e) { out.rtc = { ok: false, error: err('joinRtc', e) }; }
      // RTM チャンネル名は creds.rtmChannel があればそれ、無ければ RTC channel を流用（発見対象）
      try { out.rtm = await joinRtm({ appId: creds.appId, uid: creds.uid, rtmUid: creds.rtmUid || creds.conference_call_user_uuid, rtmToken: creds.rtmToken || creds.rtm_token, channel: creds.rtmChannel || creds.channel }); }
      catch (e) { out.rtm = { ok: false, error: err('joinRtm', e) }; }
      return out;
    },
    playUrl, playLive, listAudioInputs, stopMusic, pauseMusic, resumeMusic, sendChat,
    // Node が polling で吸う
    drainInbox: () => { const x = S.inbox.slice(); S.inbox.length = 0; return x; },
    peekInbox: () => S.inbox.slice(),
    status: () => ({ joinedRtc: S.joinedRtc, joinedRtm: S.joinedRtm, channel: S.channel, rtmChannel: S.rtmChannel, uid: S.uid, nowPlaying: S.nowPlaying, errors: S.errors.slice(-10), inbox: S.inbox.length }),
    tail: (n = 60) => S.log.slice(-n),
    leave: async () => { try { await stopMusic(); } catch {} try { await S.rtc?.leave(); } catch {} try { await S.rtm?.logout(); } catch {} S.joinedRtc = S.joinedRtm = false; return { ok: true }; },
  };
  L('YayAgora API ready', 'rtc=' + (typeof AgoraRTC !== 'undefined'), 'rtm=' + (typeof AgoraRTM !== 'undefined'));
})();
</script>
</body>
</html>
