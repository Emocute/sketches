<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tension Stacker — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{--bg:#0e0e12;--panel:#16161d;--ink:#e9e9f0;--dim:#8a8a99;
    --accent:#c9a86a;--accent2:#6a9ec9;--line:#26262f;--on:#c9a86a;--warn:#c96a6a;--good:#6ac98f;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.5;padding:24px;max-width:860px;margin:0 auto}
  h1{font-size:20px;font-weight:600}h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 18px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  label.lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:7px}
  select{background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:15px}
  .tens{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
  .ten{background:#1d1d26;border:1px solid var(--line);border-radius:10px;padding:11px 15px;cursor:pointer;
    font-family:ui-monospace,Menlo,monospace;font-size:15px;transition:.12s;min-width:54px;text-align:center}
  .ten:hover{border-color:var(--accent)}
  .ten.on{background:var(--on);color:#1a1206;border-color:var(--on);font-weight:700}
  .ten small{display:block;font-size:9px;color:var(--dim);margin-top:2px;font-family:inherit}
  .ten.on small{color:#5a4410}
  .kbd{position:relative;height:90px;margin:6px 0;user-select:none}
  .key{position:absolute;top:0;bottom:0;border:1px solid #000}
  .key.white{background:#1b1b22}.key.black{background:#0a0a0e;height:62%;z-index:2}
  .key.on{background:var(--on)}.key.root{background:#fff}
  .meter{display:flex;align-items:center;gap:12px;margin-top:10px}
  .bar{flex:1;height:10px;border-radius:6px;background:#1d1d26;overflow:hidden;border:1px solid var(--line)}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--good),var(--accent),var(--warn));transition:.2s}
  .meter .val{font-size:12px;color:var(--dim);min-width:130px}
  .play{background:var(--accent);color:#1a1206;border:none;border-radius:8px;padding:11px 20px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;margin-top:12px}
  .voices{font-size:12px;color:var(--accent2);margin-top:8px;font-family:ui-monospace,Menlo,monospace}
  .footer{margin-top:18px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px}

/* ---- design language v2 (rolled-in, 後勝ちで標準トークンを上書き / toy固有変数は温存) ---- */
:root{--bg:#0b0b0f;--bg2:#0f0f15;--panel:#15151c;--surface2:#1b1b24;
 --ink:#ececf2;--dim:#8c8c9a;--line:#262630;
 --accent:#cfac6e;--accent-soft:#e0c894;--accent2:#6fa3cf;--good:#6fc996;--warn:#cf6f6f;
 --radius:14px;--radius-sm:9px;--ease:cubic-bezier(.2,.7,.3,1);}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:radial-gradient(120% 80% at 50% -10%, #16131c 0%, var(--bg2) 38%, var(--bg) 75%) fixed;
 font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif}
button,select,input{transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease)}
button:focus-visible,select:focus-visible,input:focus-visible{outline:none;box-shadow:0 0 0 2px rgba(207,172,110,.5);border-color:var(--accent)}
button:hover{border-color:var(--accent)}
::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#26262f;border-radius:8px;border:3px solid transparent;background-clip:content-box}
.ten{transition:border-color .15s var(--ease),transform .15s var(--ease),background .15s var(--ease)}.ten:hover{transform:translateY(-1px)}
</style>
</head>
<body>
  <h1>Tension Stacker <span class="sub">どこまで積むと、濁る？</span></h1>
  <p class="tagline">コアの 7th コードにテンションを 1 つずつ積む。スイートスポットは 4-5 声（Studio）。</p>
  <div class="panel">
    <div class="row">
      <div><label class="lbl">Root</label><select id="root"></select></div>
      <div><label class="lbl">Core</label><select id="core"></select></div>
    </div>
    <div style="margin-top:14px"><label class="lbl">テンションを積む</label>
      <div class="tens" id="tens"></div>
    </div>
    <div class="voices" id="voices"></div>
    <div class="kbd"><div class="keys" id="keys"></div></div>
    <div class="meter">
      <span class="val" id="mval"></span>
      <div class="bar"><i id="mbar" style="width:0%"></i></div>
    </div>
    <button class="play" id="play"><svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg> 鳴らす</button>
  </div>
  <div class="footer">
    濁り計 = 半音衝突（♭2 関係）とトライトーン密集と総声数のヒューリスティック。低い＝開いた響き、高い＝緊張。<br>
    緑域（4-5 声）が Studio の言うスイートスポット。テンションを全部盛ると濁り計は右へ。
  </div>
<script>
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const CORES={"maj7":[0,4,7,11],"m7":[0,3,7,10],"7":[0,4,7,10],"m7b5":[0,3,6,10],"6":[0,4,7,9]};
// テンション（半音、コアの上に）
const TENS=[
  {k:"b9",iv:13,lbl:"♭9"},{k:"9",iv:14,lbl:"9"},{k:"#9",iv:15,lbl:"♯9"},
  {k:"11",iv:17,lbl:"11"},{k:"#11",iv:18,lbl:"♯11"},{k:"b13",iv:20,lbl:"♭13"},{k:"13",iv:21,lbl:"13"},
];
let rootPc=0, core="maj7", on=new Set();

const $r=document.getElementById("root"),$c=document.getElementById("core"),$t=document.getElementById("tens"),
  $keys=document.getElementById("keys"),$v=document.getElementById("voices"),$mb=document.getElementById("mbar"),$mv=document.getElementById("mval");
NOTE.forEach((n,i)=>{const o=document.createElement("option");o.value=i;o.textContent=n;$r.appendChild(o);});
Object.keys(CORES).forEach(k=>{const o=document.createElement("option");o.value=k;o.textContent=k;$c.appendChild(o);});
$r.value="2";rootPc=2;$c.value="m7";core="m7";
$r.onchange=()=>{rootPc=+$r.value;render();};
$c.onchange=()=>{core=$c.value;render();};

TENS.forEach(t=>{const d=document.createElement("div");d.className="ten";d.dataset.k=t.k;
  d.innerHTML=`${t.lbl}<small>+${t.iv}</small>`;
  d.onclick=()=>{on.has(t.k)?on.delete(t.k):on.add(t.k);render();};$t.appendChild(d);});

function curIvs(){
  let ivs=[...CORES[core]];
  TENS.forEach(t=>{if(on.has(t.k))ivs.push(t.iv);});
  return [...new Set(ivs)].sort((a,b)=>a-b);
}
function dissonance(ivs){
  // pc 集合化
  const pcs=[...new Set(ivs.map(x=>((x%12)+12)%12))].sort((a,b)=>a-b);
  let semis=0, tritones=0;
  for(let i=0;i<pcs.length;i++)for(let j=i+1;j<pcs.length;j++){
    let d=Math.abs(pcs[i]-pcs[j]); d=Math.min(d,12-d);
    if(d===1)semis++; if(d===6)tritones++;
  }
  const voices=ivs.length;
  // ヒューリスティック 0-100
  let score=semis*16 + tritones*9 + Math.max(0,voices-5)*12;
  return {score:Math.min(100,score),semis,tritones,voices};
}
function render(){
  $t.querySelectorAll(".ten").forEach(d=>d.classList.toggle("on",on.has(d.dataset.k)));
  const ivs=curIvs();
  // 鍵盤
  const LO=-1, HI=26, isB=pc=>[1,3,6,8,10].includes(((pc%12)+12)%12);
  const whites=[];for(let n=LO;n<=HI;n++)if(!isB(n))whites.push(n);
  const kw=100/whites.length; const set=new Set(ivs);
  let html="",wi=0;
  for(let n=LO;n<=HI;n++){
    const b=isB(n),hit=set.has(n),isRoot=hit&&(((n%12)+12)%12)===0;
    if(!b){html+=`<div class="key white ${hit?'on':''} ${isRoot?'root':''}" style="left:${wi*kw}%;width:${kw}%"></div>`;wi++;}
    else{html+=`<div class="key black ${hit?'on':''}" style="left:${wi*kw-kw*0.32}%;width:${kw*0.64}%"></div>`;}
  }
  $keys.style.position="relative";$keys.innerHTML=html;
  $keys.parentElement.style.setProperty("--kw",kw+"%");
  // 声数表示
  $v.textContent=`${NOTE[rootPc]}${core}`+(on.size?" + "+[...on].map(k=>TENS.find(t=>t.k===k).lbl).join(" "):"")+`　… ${ivs.length} 声`;
  // 濁り計
  const d=dissonance(ivs);
  $mb.style.width=d.score+"%";
  const sweet=(d.voices>=4&&d.voices<=5&&d.score<45);
  $mv.innerHTML=`濁り ${d.score} ／ 半音衝突 ${d.semis} ／ トライトーン ${d.tritones}`+(sweet?'　<span style="color:var(--good)">◎sweet</span>':'');
}
let synth=null;
function ensure(){if(synth)return;synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},
  envelope:{attack:.01,decay:.3,sustain:.45,release:1.3}}).toDestination();synth.volume.value=-12;}
function fr(m){return 440*Math.pow(2,(m-69)/12);}
document.getElementById("play").onclick=async()=>{await Tone.start();ensure();
  synth.triggerAttackRelease(curIvs().map(iv=>fr(60+rootPc+iv)),1.4,Tone.now());};
render();
</script>
</body>
</html>
