<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mode Mixer — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{--bg:#0e0e12;--panel:#16161d;--ink:#e9e9f0;--dim:#8a8a99;
    --accent:#c9a86a;--accent2:#6a9ec9;--line:#26262f;--char:#c96a9e;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.5;padding:24px;max-width:900px;margin:0 auto}
  h1{font-size:20px;font-weight:600}
  h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 18px}
  .modes{display:flex;flex-direction:column;gap:8px}
  .mode{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;
    display:grid;grid-template-columns:130px 1fr auto;gap:14px;align-items:center;cursor:pointer;transition:.15s}
  .mode:hover{border-color:var(--accent)}
  .mode.active{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2) inset}
  .mode .nm{font-weight:600;font-size:15px}
  .mode .bright{font-size:11px;color:var(--dim);margin-top:2px}
  .degs{display:flex;gap:5px;flex-wrap:wrap}
  .d{font-family:ui-monospace,Menlo,monospace;font-size:13px;padding:5px 9px;border-radius:7px;
    background:#1d1d26;border:1px solid var(--line)}
  .d.char{border-color:var(--char);color:var(--char);background:#241018}
  .d.root{border-color:var(--accent);color:var(--accent)}
  .play{width:40px;height:40px;border-radius:8px;background:#1d1d26;border:1px solid var(--line);
    color:var(--ink);font-size:15px;cursor:pointer}
  .play:hover{border-color:var(--accent)}
  .footer{margin-top:20px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px}
  .scale-ctrl{margin-bottom:14px;display:flex;gap:10px;align-items:center}
  select{background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-family:inherit}
</style>
</head>
<body>
  <h1>Mode Mixer <span class="sub">同じ音から、7 つの色。</span></h1>
  <p class="tagline">トニックを固定して旋法を切り替える。ピンク＝そのモードの特徴音。上＝明るい、下＝暗い。</p>
  <div class="scale-ctrl">
    <span style="font-size:11px;color:var(--dim)">トニック</span>
    <select id="tonic"></select>
  </div>
  <div class="modes" id="modes"></div>
  <div class="footer">
    並び順は明→暗（Lydian が最も明るく Locrian が最も暗い）。特徴音 = そのモードを隣の長/短音階から分ける一音。<br>
    発音はスケール上行＋トニック和音。度数はメジャースケール準拠（Studio v7）。
  </div>
<script>
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
// 明→暗
const MODES=[
  {nm:"Lydian",     iv:[0,2,4,6,7,9,11], char:6,  bright:"長調＋♯4。浮遊・夢見"},
  {nm:"Ionian",     iv:[0,2,4,5,7,9,11], char:-1, bright:"いわゆる長音階。基準"},
  {nm:"Mixolydian", iv:[0,2,4,5,7,9,10], char:10, bright:"長調＋♭7。ファンク/ロック"},
  {nm:"Dorian",     iv:[0,2,3,5,7,9,10], char:9,  bright:"短調＋♮6。ジャズ/モーダル定番"},
  {nm:"Aeolian",    iv:[0,2,3,5,7,8,10], char:-1, bright:"自然短音階。基準の暗"},
  {nm:"Phrygian",   iv:[0,1,3,5,7,8,10], char:1,  bright:"短調＋♭2。スパニッシュ/緊張"},
  {nm:"Locrian",    iv:[0,1,3,5,6,8,10], char:6,  bright:"♭2＋♭5。不安定・解決しない"},
];
const DLABEL={0:"1",1:"♭2",2:"2",3:"♭3",4:"3",5:"4",6:"♯4/♭5",7:"5",8:"♭6",9:"6",10:"♭7",11:"7"};
let tonic=0;
const $t=document.getElementById("tonic");
NOTE.forEach((n,i)=>{const o=document.createElement("option");o.value=i;o.textContent=n;$t.appendChild(o);});
$t.onchange=()=>{tonic=+$t.value;render();};

const $m=document.getElementById("modes");
function render(){
  $m.innerHTML="";
  MODES.forEach((mo,idx)=>{
    const div=document.createElement("div"); div.className="mode";
    let degs=mo.iv.map(iv=>{
      const cls=(iv===0)?"d root":(iv===mo.char)?"d char":"d";
      return `<span class="${cls}">${DLABEL[iv]}</span>`;
    }).join("");
    div.innerHTML=`<div><div class="nm">${mo.nm}</div><div class="bright">${mo.bright}</div></div>`+
      `<div class="degs">${degs}</div><button class="play"><svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg></button>`;
    div.querySelector(".play").onclick=(e)=>{e.stopPropagation();playMode(mo);};
    div.onclick=()=>{[...$m.children].forEach(c=>c.classList.remove("active"));div.classList.add("active");playMode(mo);};
    $m.appendChild(div);
  });
}
let synth=null;
function ensure(){if(synth)return;synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},
  envelope:{attack:.01,decay:.2,sustain:.3,release:.8}}).toDestination();synth.volume.value=-12;}
function fr(m){return 440*Math.pow(2,(m-69)/12);}
async function playMode(mo){
  await Tone.start();ensure();let t=Tone.now();
  // 上行スケール
  mo.iv.concat([12]).forEach(iv=>{synth.triggerAttackRelease(fr(60+tonic+iv),0.28,t);t+=0.22;});
  t+=0.15;
  // トニック和音（1-3-5-7）
  const ch=[0,mo.iv[2],mo.iv[4],mo.iv[6]].map(iv=>fr(60+tonic+iv));
  synth.triggerAttackRelease(ch,1.1,t);
}
render();
</script>
</body>
</html>
