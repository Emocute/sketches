<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord-Scale Mapper — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{--bg:#0e0e12;--panel:#16161d;--ink:#e9e9f0;--dim:#8a8a99;--accent:#c9a86a;--accent2:#6a9ec9;--line:#26262f;--ct:#c9a86a;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;line-height:1.5;padding:24px;max-width:880px;margin:0 auto}
  h1{font-size:20px;font-weight:600}h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 18px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  label.lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:7px}
  select{background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:15px}
  .chordbtn{background:var(--accent);color:#1a1206;border:none;border-radius:8px;padding:10px 18px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
  .scales{display:flex;flex-direction:column;gap:10px}
  .scale{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:grid;grid-template-columns:160px 1fr auto;gap:14px;align-items:center}
  .scale .nm{font-weight:600}.scale .use{font-size:11px;color:var(--dim);margin-top:2px}
  .degs{display:flex;gap:5px;flex-wrap:wrap}
  .d{font-family:ui-monospace,Menlo,monospace;font-size:13px;padding:5px 9px;border-radius:7px;background:#1d1d26;border:1px solid var(--line)}
  .d.ct{border-color:var(--ct);color:var(--ct);background:#241d10}
  .play{width:40px;height:40px;border-radius:8px;background:#1d1d26;border:1px solid var(--line);color:var(--ink);font-size:15px;cursor:pointer}
  .footer{margin-top:18px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px}

/* ---- design language v2 (rolled-in, 後勝ちで標準トークンを上書き / toy固有変数は温存) ---- */
:root{--bg:#0b0b0f;--bg2:#0f0f15;--panel:#15151c;--surface2:#1b1b24;
 --ink:#ececf2;--dim:#8c8c9a;--line:#262630;
 --accent:#cfac6e;--accent-soft:#e0c894;--accent2:#6fa3cf;--good:#6fc996;--warn:#cf6f6f;
 --radius:14px;--radius-sm:9px;--ease:cubic-bezier(.2,.7,.3,1);}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:radial-gradient(120% 80% at 50% -10%, #16131c 0%, var(--bg2) 38%, var(--bg) 75%) fixed;
 font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif}
button,select,input{transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease)}
button:focus-visible,select:focus-visible,input:focus-visible{outline:none;box-shadow:0 0 0 2px rgba(207,172,110,.5);border-color:var(--accent)}
button:hover{border-color:var(--accent)}
::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#26262f;border-radius:8px;border:3px solid transparent;background-clip:content-box}
.scale{transition:border-color .2s var(--ease),box-shadow .2s var(--ease),transform .2s var(--ease)}.scale:hover{transform:translateY(-2px);border-color:#3a3340;box-shadow:0 8px 24px -14px rgba(0,0,0,.7)}
</style>
</head>
<body>
  <h1>Chord-Scale Mapper <span class="sub">このコードに、どの音列。</span></h1>
  <p class="tagline">コードの上で吹ける／弾けるスケールを示す。ゴールド＝コード構成音（着地点）。</p>
  <div class="panel">
    <div class="row">
      <div><label class="lbl">Root</label><select id="root"></select></div>
      <div><label class="lbl">Chord</label><select id="qual"></select></div>
      <button class="chordbtn" id="playChord"><svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg> コードを鳴らす</button>
    </div>
  </div>
  <div class="scales" id="scales"></div>
  <div class="footer">
    各スケールはコード構成音を必ず含む（<code>node</code> 検証済み）。度数 = メジャースケール準拠（Studio v7）。<br>
    <svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg> でコード → スケール上行を続けて発音。スケールの非コード音＝テンション／経過音。
  </div>
<script>
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const SCALES={
  "Ionian":[0,2,4,5,7,9,11],"Lydian":[0,2,4,6,7,9,11],"Dorian":[0,2,3,5,7,9,10],
  "Aeolian":[0,2,3,5,7,8,10],"Mixolydian":[0,2,4,5,7,9,10],"Lydian Dominant":[0,2,4,6,7,9,10],
  "Locrian":[0,1,3,5,6,8,10],"Locrian ♮2":[0,2,3,5,6,8,10],"Altered":[0,1,3,4,6,8,10],
  "Whole-Half Dim":[0,2,3,5,6,8,9,11]};
const CHORDS={
  "maj7":{iv:[0,4,7,11],sc:["Ionian","Lydian"],lbl:"maj7"},
  "m7":{iv:[0,3,7,10],sc:["Dorian","Aeolian"],lbl:"m7"},
  "7":{iv:[0,4,7,10],sc:["Mixolydian","Lydian Dominant"],lbl:"7"},
  "m7b5":{iv:[0,3,6,10],sc:["Locrian","Locrian ♮2"],lbl:"m7♭5"},
  "dim7":{iv:[0,3,6,9],sc:["Whole-Half Dim"],lbl:"dim7"},
  "7alt":{iv:[0,4,8,10],sc:["Altered"],lbl:"7alt"},
};
const USE={"Ionian":"明るく素直","Lydian":"浮遊・♯11 を効かせる","Dorian":"ジャズの定番マイナー","Aeolian":"自然短・哀感",
  "Mixolydian":"ファンク/ブルース","Lydian Dominant":"♯11 ドミナント・モーダル","Locrian":"ハーフディミニッシュ標準",
  "Locrian ♮2":"より明るい m7♭5","Altered":"全テンション・最大緊張","Whole-Half Dim":"対称・dim7 専用"};
const DLABEL={0:"1",1:"♭9",2:"9",3:"♭3",4:"3",5:"11",6:"♯11",7:"5",8:"♭13",9:"13",10:"♭7",11:"7"};
let rootPc=0, qual="maj7";
const $r=document.getElementById("root"),$q=document.getElementById("qual"),$s=document.getElementById("scales");
NOTE.forEach((n,i)=>{const o=document.createElement("option");o.value=i;o.textContent=n;$r.appendChild(o);});
Object.entries(CHORDS).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v.lbl;$q.appendChild(o);});
$r.value="7";rootPc=7;$q.value="7";qual="7";
$r.onchange=()=>{rootPc=+$r.value;render();};$q.onchange=()=>{qual=$q.value;render();};

function render(){
  const ch=CHORDS[qual]; const ctones=new Set(ch.iv.map(x=>x%12));
  $s.innerHTML="";
  ch.sc.forEach(scn=>{
    const sc=SCALES[scn];
    const degs=sc.map(iv=>{const isCt=ctones.has(iv%12);return `<span class="d ${isCt?'ct':''}">${DLABEL[iv]}</span>`;}).join("");
    const div=document.createElement("div");div.className="scale";
    div.innerHTML=`<div><div class="nm">${NOTE[rootPc]} ${scn}</div><div class="use">${USE[scn]||""}</div></div>`+
      `<div class="degs">${degs}</div><button class="play"><svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg></button>`;
    div.querySelector(".play").onclick=()=>playChordScale(ch.iv,sc);
    $s.appendChild(div);
  });
}
let synth=null;
function ensure(){if(synth)return;synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},envelope:{attack:.01,decay:.2,sustain:.35,release:.8}}).toDestination();synth.volume.value=-12;}
function fr(m){return 440*Math.pow(2,(m-69)/12);}
async function playChordScale(iv,sc){await Tone.start();ensure();let t=Tone.now();
  synth.triggerAttackRelease(iv.map(x=>fr(60+rootPc+x)),0.9,t);t+=1.0;
  sc.concat([12]).forEach(x=>{synth.triggerAttackRelease(fr(60+rootPc+x),0.26,t);t+=0.2;});}
document.getElementById("playChord").onclick=async()=>{await Tone.start();ensure();
  synth.triggerAttackRelease(CHORDS[qual].iv.map(x=>fr(60+rootPc+x)),1.1,Tone.now());};
render();
</script>
</body>
</html>
