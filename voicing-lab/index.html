<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voicing Lab — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{
    --bg:#0e0e12; --panel:#16161d; --ink:#e9e9f0; --dim:#8a8a99;
    --accent:#c9a86a; --accent2:#6a9ec9; --line:#26262f; --hit:#c9a86a;
    --hit-rootless:#6ac98f; --warn:#c96a6a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.5;padding:24px;max-width:1080px;margin:0 auto}
  h1{font-size:20px;font-weight:600;letter-spacing:.02em}
  h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 20px}
  .controls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:18px}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  select,button{background:#1d1d26;color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;cursor:pointer}
  select:hover,button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);color:#1a1206;border-color:var(--accent);font-weight:600}
  .ctx{display:flex;gap:8px;flex-wrap:wrap}
  .ctx button{font-size:12px;padding:6px 11px}
  .ctx button.active{background:var(--accent2);color:#06121d;border-color:var(--accent2)}
  .chordname{font-size:15px;color:var(--accent);margin:0 0 14px;font-weight:600}
  .chordname .deg{color:var(--dim);font-weight:400;font-size:13px;margin-left:8px}
  .grid{display:flex;flex-direction:column;gap:12px}
  .voicing{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;display:grid;grid-template-columns:150px 1fr auto;gap:16px;align-items:center;
    transition:border-color .15s}
  .voicing.highlight{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2) inset}
  .voicing .meta{min-width:0}
  .voicing .vname{font-size:15px;font-weight:600}
  .voicing .vdesc{font-size:12px;color:var(--dim);margin-top:2px}
  .voicing .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;
    background:var(--accent2);color:#06121d;margin-left:8px;vertical-align:middle}
  .voicing .badge.warn{background:var(--warn);color:#fff}
  .tensions{font-size:12px;color:var(--accent);font-family:ui-monospace,Menlo,monospace;margin-top:5px;word-spacing:2px}
  .kbd{position:relative;height:64px;user-select:none}
  .kbd .keys{position:relative;height:100%}
  .key{position:absolute;top:0;bottom:0;border:1px solid #000;border-radius:0 0 3px 3px}
  .key.white{background:#1b1b22;width:var(--kw)}
  .key.black{background:#0a0a0e;height:62%;z-index:2;border-radius:0 0 2px 2px}
  .key.on{background:var(--hit)}
  .key.on.black{background:var(--hit)}
  .key.root{background:#fff}
  .key.root.black{background:#fff}
  .key .dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
    font-size:8px;color:#1a1206;font-weight:700}
  .playbtn{background:#1d1d26;border:1px solid var(--line);border-radius:8px;
    width:42px;height:42px;font-size:16px;display:flex;align-items:center;justify-content:center}
  .footer{margin-top:22px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px}
  .footer code{background:#1d1d26;padding:1px 5px;border-radius:4px;font-size:11px}
  .playall{margin-left:auto}
</style>
</head>
<body>
  <h1>Voicing Lab <span class="sub">同じコードを、別の積み方で。</span></h1>
  <p class="tagline">Studio の和声哲学を耳で。1 コードを 7 種のボイシングで鳴らし比べる実験室。</p>

  <div class="controls">
    <div class="field">
      <label>Root</label>
      <select id="root"></select>
    </div>
    <div class="field">
      <label>Quality</label>
      <select id="quality"></select>
    </div>
    <div class="field">
      <label>文脈プリセット</label>
      <div class="ctx" id="ctx">
        <button data-ctx="solo" class="active">ピアノ単独</button>
        <button data-ctx="stab">stab</button>
        <button data-ctx="comp">comping</button>
      </div>
    </div>
    <button class="primary playall" id="playAll">▶ 順に鳴らす</button>
  </div>

  <div class="chordname" id="chordName"></div>
  <div class="grid" id="grid"></div>

  <div class="footer">
    度数はメジャースケール準拠（Studio v7 表記、I=0 II=2 III=4 IV=5 V=7 VI=9 VII=11）。
    インターバル定義は <code>emocute/voicing.py</code> の哲学をミラー。音は Tone.js（ブラウザ完結）。<br>
    文脈プリセットが青枠で「この場面ならコレ」を示す — Studio の知見そのまま：
    <code>ピアノ単独=ルート含む</code> / <code>stab=rootless</code> / <code>comping=drop2</code>。
  </div>

<script>
// ---- Studio v7 準拠データ ----------------------------------------------------
const ROOTS = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const ROOT_PC = {C:0,"C#":1,D:2,"D#":3,E:4,F:5,"F#":6,G:7,"G#":8,A:9,"A#":10,B:11};

// chord_defs.py::CHORD_INTERVALS 相当（root=0 基準・半音）
const QUALITIES = {
  "maj7":   {label:"maj7",   iv:[0,4,7,11]},
  "min7":   {label:"min7",   iv:[0,3,7,10]},
  "7":      {label:"7",      iv:[0,4,7,10]},
  "m7b5":   {label:"m7♭5",   iv:[0,3,6,10]},
  "dim7":   {label:"dim7",   iv:[0,3,6,9]},
  "maj9":   {label:"maj9",   iv:[0,4,7,11,14]},
  "min9":   {label:"min9",   iv:[0,3,7,10,14]},
  "9":      {label:"9",      iv:[0,4,7,10,14]},
  "13":     {label:"13",     iv:[0,4,7,10,14,21]},
  "min11":  {label:"min11",  iv:[0,3,7,10,14,17]},
  "6":      {label:"6",      iv:[0,4,7,9]},
  "m6":     {label:"m6",     iv:[0,3,7,9]},
  "add9":   {label:"add9",   iv:[0,4,7,14]},
  "7sus4":  {label:"7sus4",  iv:[0,5,7,10]},
  "mMaj7":  {label:"mMaj7",  iv:[0,3,7,11]},
  "7alt":   {label:"7alt",   iv:[0,4,10,15,20]}, // 3, ♭7, #9, ♭13
};

// 半音 → テンション度数ラベル（>12 は上部テンション優先）
const TLABEL = {0:"R",1:"♭9",2:"9",3:"♭3",4:"3",5:"11",6:"♭5",7:"5",
  8:"♭13",9:"13",10:"♭7",11:"7",13:"♭9",14:"9",15:"♯9",17:"11",18:"♯11",20:"♭13",21:"13"};
function tlabel(iv){ if(iv in TLABEL) return TLABEL[iv]; const m=((iv%12)+12)%12; return TLABEL[m]||("+"+iv); }

// ---- ボイシング生成 ----------------------------------------------------------
// 全て「root の MIDI」を基準に絶対ノート列を返す。基準 root = C3 相当 = 48 + pc
const BASE = 48;

function closeV(iv){ return iv.map(x=>x); }               // そのまま積む
function shellV(iv){ // root + 3rd系 + 7th系（guide tone）
  const third = iv.find(x=>[3,4].includes(x%12)) ?? iv[1];
  const sev   = iv.find(x=>[10,11].includes(x%12));
  const out=[0]; if(third!=null)out.push(third); if(sev!=null)out.push(sev);
  return [...new Set(out)].sort((a,b)=>a-b);
}
function rootlessV(iv){ // root 抜き、3-5-7-9 を中音域に寄せる
  let t = iv.filter(x=>x!==0).map(x=> x>=12 ? x : x); // root 以外
  // 5度が無く密になりすぎない範囲で 3/7/9/13 を残す
  let keep = t.filter(x=>{const m=x%12; return ![7].includes(m) || t.length<=2;});
  if(keep.length<3) keep=t;
  return keep.sort((a,b)=>a-b);
}
function drop2V(iv){ // close を上から2番目を1オクターブ下げる
  let v=[...iv].sort((a,b)=>a-b);
  if(v.length<3) return v;
  const i=v.length-2; v=[...v]; v[i]=v[i]-12;
  return v.sort((a,b)=>a-b);
}
function drop3V(iv){
  let v=[...iv].sort((a,b)=>a-b);
  if(v.length<4) return drop2V(iv);
  const i=v.length-3; v=[...v]; v[i]=v[i]-12;
  return v.sort((a,b)=>a-b);
}
function quartalV(iv){ // 4度堆積（So What 系）。chord tone から完全4度を3-4回
  // ルート/♭3 or ルート/4 を起点に +5半音を積む
  const start = iv.includes(3)?3:(iv.includes(5)?0:0);
  let n=start, out=[start];
  for(let k=0;k<3;k++){ n+=5; out.push(n); }
  return out;
}
function spreadV(iv){ // 4-5声テンション・スイートスポット：ルートを低く、上部に 3/7/9/(13) を開く
  const has = m => iv.find(x=>x%12===m);
  const third = iv.find(x=>[3,4].includes(x%12));
  const sev   = iv.find(x=>[10,11].includes(x%12));
  const nine  = iv.find(x=>[2,14].includes(x%12)) ?? null;
  const thir  = iv.find(x=>[9,21].includes(x%12)) ?? null;
  let out=[-12, 0]; // root を1オクターブ下にも置いてベース感
  if(third!=null) out.push(third);
  if(sev!=null)   out.push(sev+0);
  if(nine!=null)  out.push((nine%12)+12);
  if(thir!=null)  out.push((thir%12)+12);
  // 5声に抑える（スイートスポット）
  out=[...new Set(out)].sort((a,b)=>a-b);
  if(out.length>6) out=out.slice(0,6);
  return out;
}

const VOICINGS = [
  {key:"close",   name:"Close",   gen:closeV,    desc:"密集。基本形。root 含む、最もニュートラル"},
  {key:"drop2",   name:"Drop2",   gen:drop2V,    desc:"上から2声目を1oct下げ。内声が開いて大人びる（comping 定番）"},
  {key:"drop3",   name:"Drop3",   gen:drop3V,    desc:"上から3声目を落とす。さらに広い open voicing"},
  {key:"rootless",name:"Rootless",gen:rootlessV, desc:"root 抜き。ベースが別なら効く／ピアノ単独だと寂しい"},
  {key:"quartal", name:"Quartal", gen:quartalV,  desc:"4度堆積。調性を曖昧にする浮遊系（modal）"},
  {key:"shell",   name:"Shell",   gen:shellV,    desc:"root+3rd+7th のガイドトーンのみ。最小骨格"},
  {key:"spread",  name:"Spread",  gen:spreadV,   desc:"4-5声テンションを広く。Studio の言うスイートスポット"},
];

// 文脈プリセット → 強調するボイシング
const CTX_HL = { solo:["close","spread"], stab:["rootless","close"], comp:["drop2","drop3"] };

// ---- 描画 -------------------------------------------------------------------
const $root=document.getElementById("root"), $qual=document.getElementById("quality"),
      $grid=document.getElementById("grid"), $name=document.getElementById("chordName");
let currentCtx="solo";

ROOTS.forEach(r=>{const o=document.createElement("option");o.value=r;o.textContent=r;$root.appendChild(o);});
Object.entries(QUALITIES).forEach(([k,v])=>{const o=document.createElement("option");o.value=k;o.textContent=v.label;$qual.appendChild(o);});
$root.value="D"; $qual.value="min9";

// ピアノ鍵盤を1つ描く（与えられた絶対ノート集合を点灯）。表示レンジ -14..+26
function keyboard(notesAbs, rootPc){
  const LO=-15, HI=27;
  const isBlack=pc=>[1,3,6,8,10].includes(((pc%12)+12)%12);
  // 白鍵だけ幅割当
  const whites=[]; for(let n=LO;n<=HI;n++){ if(!isBlack(n)) whites.push(n); }
  const kw=100/whites.length;
  const set=new Set(notesAbs);
  let html=`<div class="kbd"><div class="keys" style="--kw:${kw}%">`;
  let wi=0;
  for(let n=LO;n<=HI;n++){
    const black=isBlack(n);
    const on=set.has(n);
    const isRoot=on && (((n%12)+12)%12)===rootPc;
    if(!black){
      const left=wi*kw;
      html+=`<div class="key white ${on?'on':''} ${isRoot?'root':''}" style="left:${left}%">`+
            (on?`<span class="dot">${tlabel(noteToIv(n))}</span>`:``)+`</div>`;
      wi++;
    }else{
      const left=wi*kw - kw*0.32;
      html+=`<div class="key black ${on?'on':''} ${isRoot?'root':''}" style="left:${left}%;width:${kw*0.64}%">`+
            (on?`<span class="dot">${tlabel(noteToIv(n))}</span>`:``)+`</div>`;
    }
  }
  html+=`</div></div>`;
  return html;
}
// 絶対ノート → root 基準インターバル（ラベル用）
let _rootAbs=0;
function noteToIv(n){ return n - _rootAbs; }

function render(){
  const r=$root.value, q=$qual.value;
  const pc=ROOT_PC[r], iv=QUALITIES[q].iv;
  _rootAbs = BASE + pc;
  $name.innerHTML = `${r}${QUALITIES[q].label} <span class="deg">— 各ボイシング比較</span>`;
  $grid.innerHTML="";
  VOICINGS.forEach(v=>{
    const rel=v.gen(iv);                          // root 基準
    const abs=rel.map(x=> BASE+pc+x);             // 絶対 MIDI
    const tens=rel.slice().sort((a,b)=>a-b).map(tlabel).join("  ");
    const hl=CTX_HL[currentCtx].includes(v.key);
    const warn = (v.key==="rootless" && currentCtx==="solo");
    const div=document.createElement("div");
    div.className="voicing"+(hl?" highlight":"");
    div.innerHTML=
      `<div class="meta">
         <div class="vname">${v.name}${hl?`<span class="badge ${warn?'warn':''}">${warn?'単独だと薄い':'この文脈◎'}</span>`:''}</div>
         <div class="vdesc">${v.desc}</div>
         <div class="tensions">${tens}</div>
       </div>
       <div>${keyboard(abs, pc)}</div>
       <button class="playbtn" title="鳴らす">▶</button>`;
    div.querySelector(".playbtn").onclick=()=>playChord(abs);
    $grid.appendChild(div);
  });
}

// ---- 音 ---------------------------------------------------------------------
let synth=null;
function ensureSynth(){
  if(synth) return;
  synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},
    envelope:{attack:.01,decay:.3,sustain:.4,release:1.4}}).toDestination();
  synth.volume.value=-10;
}
function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
async function playChord(abs){
  await Tone.start(); ensureSynth();
  const now=Tone.now();
  const freqs=abs.map(midiToFreq);
  synth.triggerAttackRelease(freqs, 1.1, now);
}
document.getElementById("playAll").onclick=async()=>{
  await Tone.start(); ensureSynth();
  const r=$root.value,q=$qual.value,pc=ROOT_PC[r],iv=QUALITIES[q].iv;
  let t=Tone.now();
  const cards=[...$grid.children];
  VOICINGS.forEach((v,i)=>{
    const abs=v.gen(iv).map(x=>BASE+pc+x).map(midiToFreq);
    synth.triggerAttackRelease(abs,0.9,t);
    const card=cards[i];
    setTimeout(()=>{cards.forEach(c=>c.style.outline="");card.style.outline="2px solid var(--accent)";},(t-Tone.now())*1000);
    t+=1.0;
  });
  setTimeout(()=>cards.forEach(c=>c.style.outline=""), (t-Tone.now())*1000+400);
};

document.getElementById("ctx").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  currentCtx=b.dataset.ctx;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle("active",x===b));
  render();
});
$root.onchange=render; $qual.onchange=render;
render();
</script>
</body>
</html>
