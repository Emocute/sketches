<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadence Lab — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{--bg:#0e0e12;--panel:#16161d;--ink:#e9e9f0;--dim:#8a8a99;--accent:#c9a86a;--accent2:#6a9ec9;--line:#26262f;--good:#6ac98f;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;line-height:1.5;padding:24px;max-width:760px;margin:0 auto}
  h1{font-size:20px;font-weight:600}h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 18px}
  .keyrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  select{background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-family:inherit;font-size:15px}
  .cads{display:flex;flex-direction:column;gap:12px}
  .cad{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;cursor:pointer;transition:.12s}
  .cad:hover{border-color:var(--accent)}
  .cad .nm{font-weight:600;font-size:15px}
  .cad .prog{font-family:ui-monospace,Menlo,monospace;color:var(--accent2);font-size:14px;margin-top:3px}
  .cad .desc{font-size:12px;color:var(--dim);margin-top:4px}
  .res{display:flex;align-items:center;gap:8px}
  .res .bar{width:80px;height:8px;border-radius:5px;background:#1d1d26;overflow:hidden;border:1px solid var(--line)}
  .res .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--good))}
  .play{width:42px;height:42px;border-radius:8px;background:#1d1d26;border:1px solid var(--line);color:var(--ink);font-size:16px;cursor:pointer}
  .footer{margin-top:18px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px}

/* ---- design language v2 (rolled-in, 後勝ちで標準トークンを上書き / toy固有変数は温存) ---- */
:root{--bg:#0b0b0f;--bg2:#0f0f15;--panel:#15151c;--surface2:#1b1b24;
 --ink:#ececf2;--dim:#8c8c9a;--line:#262630;
 --accent:#cfac6e;--accent-soft:#e0c894;--accent2:#6fa3cf;--good:#6fc996;--warn:#cf6f6f;
 --radius:14px;--radius-sm:9px;--ease:cubic-bezier(.2,.7,.3,1);}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:radial-gradient(120% 80% at 50% -10%, #16131c 0%, var(--bg2) 38%, var(--bg) 75%) fixed;
 font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif}
button,select,input{transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease)}
button:focus-visible,select:focus-visible,input:focus-visible{outline:none;box-shadow:0 0 0 2px rgba(207,172,110,.5);border-color:var(--accent)}
button:hover{border-color:var(--accent)}
::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#26262f;border-radius:8px;border:3px solid transparent;background-clip:content-box}
.cad{transition:border-color .2s var(--ease),box-shadow .2s var(--ease),transform .2s var(--ease)}.cad:hover{transform:translateY(-2px);box-shadow:0 8px 24px -14px rgba(0,0,0,.7)}
</style>
</head>
<body>
  <h1>Cadence Lab <span class="sub">終わった感じ、宙づり、肩透かし。</span></h1>
  <p class="tagline">4 つの終止形を弾き比べる。緑バー＝解決感の強さ。</p>
  <div class="keyrow"><span style="font-size:12px;color:var(--dim)">キー</span><select id="key"></select></div>
  <div class="cads" id="cads"></div>
  <div class="footer">
    各コードは close voicing（7th 込み）で発音。度数 = メジャースケール準拠（Studio v7）。<br>
    解決感は一般的な機能和声の強さ（正格＞変格＞半＞偽）を目安表示。
  </div>
<script>
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const MAJ=[0,2,4,5,7,9,11];
// deg index(0-6) + quality
const Q={maj7:[0,4,7,11],m7:[0,3,7,10],"7":[0,4,7,10],m7b5:[0,3,6,10],triad:[0,4,7],mtriad:[0,3,7]};
const CADS=[
  {nm:"正格終止 (Authentic)",prog:"V7 → I",res:100,desc:"最も強い解決。終わった感じ",seq:[[4,"7"],[0,"maj7"]]},
  {nm:"変格終止 (Plagal)",prog:"IV → I",res:70,desc:"アーメン終止。柔らかい解決",seq:[[3,"maj7"],[0,"maj7"]]},
  {nm:"半終止 (Half)",prog:"I → V",res:35,desc:"V で止める。宙づり・続きを呼ぶ",seq:[[0,"maj7"],[4,"7"]]},
  {nm:"偽終止 (Deceptive)",prog:"V7 → vi",res:50,desc:"I を期待させて vi へ。肩透かし",seq:[[4,"7"],[5,"m7"]]},
];
let key=0;
const $k=document.getElementById("key"),$c=document.getElementById("cads");
NOTE.forEach((n,i)=>{const o=document.createElement("option");o.value=i;o.textContent=n+" major";$k.appendChild(o);});
$k.onchange=()=>{key=+$k.value;render();};
const DEGNAME=["I","II","III","IV","V","VI","VII"];
function render(){
  $c.innerHTML="";
  CADS.forEach(cd=>{
    const div=document.createElement("div");div.className="cad";
    div.innerHTML=`<div><div class="nm">${cd.nm}</div><div class="prog">${cd.prog}</div><div class="desc">${cd.desc}</div></div>`+
      `<div class="res"><div class="bar"><i style="width:${cd.res}%"></i></div><button class="play"><svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg></button></div>`;
    const play=()=>playCad(cd.seq);
    div.querySelector(".play").onclick=(e)=>{e.stopPropagation();play();};
    div.onclick=play;
    $c.appendChild(div);
  });
}
let synth=null;
function ensure(){if(synth)return;synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},envelope:{attack:.01,decay:.3,sustain:.45,release:1.3}}).toDestination();synth.volume.value=-11;}
function fr(m){return 440*Math.pow(2,(m-69)/12);}
async function playCad(seq){
  await Tone.start();ensure();let t=Tone.now();
  seq.forEach(([deg,q],i)=>{
    const root=(key+MAJ[deg])%12;
    const notes=Q[q].map(iv=>fr(60+root+iv));
    synth.triggerAttackRelease(notes, i===seq.length-1?1.6:0.85, t);
    t+= i===seq.length-1?1.6:0.95;
  });
}
render();
</script>
</body>
</html>
