<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>voice rooms</title>
<style>
  :root {
    --bg:#0a0a0a; --surface:#121212; --surface2:#171717; --line:#242424; --line2:#1b1b1b;
    --fg:#ececec; --mut:#9a9da3; --dim:#6a6d73;
    --rose:#ff5e7e; --rose-dim:#3a1a22; --rose-soft:#ff8aa3; --gold:#e8c84a; --ok:#5ad17e; --red:#ff4d4d;
    --radius:14px; --appbar-h:50px; --tabbar-h:58px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:#000; }
  body {
    font-family:"Roboto",-apple-system,"Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    font-size:15px; color:var(--fg); -webkit-font-smoothing:antialiased;
    display:flex; justify-content:center;
  }
  .app { position:relative; width:100%; max-width:430px; background:var(--bg);
    height:100vh; overflow:hidden; display:flex; flex-direction:column;
    border-left:1px solid #1a1a1a; border-right:1px solid #1a1a1a; }
  svg { display:block; }
  button { font:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  a { color:inherit; text-decoration:none; }

  /* ── 画面 ── */
  /* 表示はルーターが排他制御する。各画面の [data-screen] が display を付けても勝てるよう !important */
  .screen { position:absolute; inset:0; display:none !important; flex-direction:column; background:var(--bg); overflow:hidden; }
  .screen.active { display:flex !important; }
  /* 画面内の固定要素はビューポートでなく .app 枠内に収める */
  .screen [style*="position:fixed"], .screen .input-bar { position:absolute !important; }
  .scroll { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  .scroll-pad { padding:14px; }
  .has-tabbar .scroll { padding-bottom:calc(var(--tabbar-h) + 12px); }

  /* ── appbar ── */
  .appbar { height:var(--appbar-h); flex:0 0 var(--appbar-h); display:flex; align-items:center; gap:6px;
    padding:0 8px; border-bottom:1px solid var(--line); background:rgba(10,10,10,.95);
    backdrop-filter:blur(8px); position:relative; z-index:5; }
  .appbar-title { flex:1; text-align:center; font-weight:700; font-size:16px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .appbar-title small { display:block; font-weight:400; font-size:11px; color:var(--dim); margin-top:1px; }
  .appbar-act, .appbar-back { width:40px; height:40px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; color:var(--mut); flex:0 0 40px; }
  .appbar-act:hover, .appbar-back:hover { color:var(--fg); background:#1a1a1a; }
  .appbar > .spacer { width:40px; flex:0 0 40px; }

  /* ── 基本コンポーネント ── */
  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; }
  .card + .card { margin-top:10px; }
  .row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line2); }
  .row:last-child { border-bottom:none; }
  .avatar, .user-icon { width:44px; height:44px; border-radius:50%; background:var(--surface2);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-weight:700;
    color:var(--mut); flex:0 0 auto; overflow:hidden; font-size:16px; background-size:cover; background-position:center; }
  .avatar.lg, .user-icon.lg { width:72px; height:72px; font-size:24px; }
  .avatar.sm, .user-icon.sm { width:30px; height:30px; font-size:12px; }
  .chip { display:inline-flex; align-items:center; gap:5px; font-size:13px; background:var(--surface2);
    border:1px solid var(--line); color:var(--mut); border-radius:18px; padding:6px 13px; white-space:nowrap; }
  .chip.sel { border-color:var(--rose); color:var(--rose); background:var(--rose-dim); }
  .chip.tag { color:var(--mut); }
  .chip.mini { font-size:11px; padding:3px 9px; }
  .btn { background:var(--rose); color:#1a0a0e; font-weight:700; font-size:14px; padding:9px 18px;
    border-radius:22px; white-space:nowrap; transition:filter .12s; }
  .btn:hover { filter:brightness(1.08); }
  .btn:active { filter:brightness(.95); }
  .btn.ghost { background:transparent; color:var(--rose); border:1.5px solid var(--rose); }
  .btn.ghost:hover { background:var(--rose-dim); filter:none; }
  .btn.gray { background:var(--surface2); color:var(--fg); border:1px solid var(--line); }
  .btn.mini { font-size:12px; padding:6px 14px; }
  .btn.block { display:block; width:100%; text-align:center; padding:13px; border-radius:24px; }
  .btn.block + .btn.block { margin-top:9px; }
  .input { width:100%; background:#0e0e0e; border:1px solid var(--line); color:var(--fg);
    border-radius:20px; padding:10px 14px; font:inherit; font-size:14px; outline:none; }
  .input:focus { border-color:var(--dim); }
  .input::placeholder { color:var(--dim); }
  .field { display:flex; flex-direction:column; gap:7px; }
  .lbl { font-size:11px; color:var(--dim); letter-spacing:.06em; }
  .section-lbl { font-size:13px; color:var(--fg); font-weight:700; margin:18px 2px 10px; }
  .section-lbl:first-child { margin-top:2px; }
  .muted { color:var(--mut); } .dim { color:var(--dim); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); display:inline-block; flex:0 0 auto; }
  .dot.rose { background:var(--rose); } .dot.ok { background:var(--ok); }
  .badge { font-size:9px; padding:2px 7px; border-radius:8px; background:var(--surface2); color:var(--mut); }
  .fab { position:absolute; right:16px; bottom:calc(var(--tabbar-h) + 16px); width:56px; height:56px;
    border-radius:50%; background:var(--rose); color:#1a0a0e; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(255,94,126,.3); z-index:6; }
  .screen:not(.has-tabbar) .fab { bottom:16px; }
  .toggle { width:42px; height:25px; border-radius:13px; background:#2a2a2a; position:relative; flex:0 0 auto; transition:background .15s; }
  .toggle::after { content:""; position:absolute; top:3px; left:3px; width:19px; height:19px; border-radius:50%; background:#888; transition:transform .15s,background .15s; }
  .toggle.on { background:var(--rose-dim); } .toggle.on::after { transform:translateX(17px); background:var(--rose); }
  .bubble { max-width:76%; padding:9px 13px; border-radius:18px; background:var(--surface2); font-size:14px; line-height:1.45; align-self:flex-start; }
  .bubble.me { align-self:flex-end; background:var(--rose-dim); color:#ffd8e0; }

  /* ── SNS流: セグメントタブ（フォロー中/オープン 等） ── */
  .seg-tabs { display:flex; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:3; }
  .seg-tab { flex:1; text-align:center; padding:13px 0; font-size:14px; font-weight:600; color:var(--dim); position:relative; }
  .seg-tab.on { color:var(--fg); }
  .seg-tab.on::after { content:""; position:absolute; left:50%; transform:translateX(-50%); bottom:-1px; width:44%; height:2.5px; background:var(--rose); border-radius:2px; }

  /* ── SNS流: 投稿（アバター左 + 本文 + アクション） ── */
  .post { display:flex; gap:11px; padding:13px 14px; border-bottom:1px solid var(--line2); }
  .post .pbody { flex:1; min-width:0; }
  .post .phead { display:flex; align-items:baseline; gap:7px; }
  .post .pname { font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .post .ptime { color:var(--dim); font-size:12px; margin-left:auto; flex:0 0 auto; }
  .post .ptext { font-size:14px; line-height:1.55; margin:4px 0 2px; word-break:break-word; }
  .post-actions { display:flex; gap:24px; margin-top:8px; color:var(--dim); }
  .post-actions .pa { display:flex; align-items:center; gap:6px; font-size:12px; }
  .post-actions .pa svg { width:17px; height:17px; }
  .post-actions .pa.liked { color:var(--rose); }

  /* ── SNS流: カバー画像（画像が無いのでブランドのグラデ面） ── */
  .cover { background:linear-gradient(135deg,var(--rose-dim),var(--surface2) 70%); position:relative; }
  .cover.banner { height:104px; }

  /* ── 下タブ（参考: タイムライン/サークル/チャット/通知/プロフィール） ── */
  .tabbar { position:absolute; left:0; right:0; bottom:0; height:var(--tabbar-h); display:flex;
    border-top:1px solid var(--line); background:rgba(10,10,10,.96); backdrop-filter:blur(8px); z-index:10; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--dim); font-size:10px; }
  .tab.active { color:var(--rose); }
  .tab svg { width:23px; height:23px; }
  .tabbar.hidden { display:none; }
</style>
</head>
<body>
<div class="app" id="app">
<!--SCREENS-->

  <nav class="tabbar" id="tabbar">
    <button class="tab" data-go-tab="timeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="14" y2="17"/></svg>タイムライン</button>
    <button class="tab" data-go-tab="circles"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="5"/><circle cx="16" cy="15" r="5"/></svg>サークル</button>
    <button class="tab" data-go-tab="chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-4.5A8.4 8.4 0 1 1 21 11.5z"/></svg>チャット</button>
    <button class="tab" data-go-tab="notifications"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>通知</button>
    <button class="tab" data-go-tab="profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>プロフィール</button>
  </nav>
</div>

<script>
const TAB_SCREENS = ['timeline','circles','chat','notifications','profile'];
let stack = [];
const $$ = (s)=>document.querySelectorAll(s);
const screenEl = (id)=>document.querySelector(`[data-screen="${id}"]`);

function render(id){
  const t = screenEl(id); if(!t){ console.warn('no screen',id); return; }
  $$('.screen').forEach(s=>s.classList.remove('active')); t.classList.add('active');
  const isTab = TAB_SCREENS.includes(id);
  document.getElementById('tabbar').classList.toggle('hidden', !isTab);
  t.classList.toggle('has-tabbar', isTab);
  $$('.tab').forEach(x=>x.classList.toggle('active', x.dataset.goTab===id));
  const sc=t.querySelector('.scroll'); if(sc) sc.scrollTop=0;
}
function go(id){ stack.push(id); render(id); }
function goTab(id){ stack=[id]; render(id); }
function back(){ stack.pop(); render(stack[stack.length-1]||'timeline'); }

function balanceAppbars(){
  $$('.appbar').forEach(bar=>{ if(!bar.querySelector('.appbar-back') && !bar.querySelector('.spacer') && bar.querySelector('.appbar-title')){
    const sp=document.createElement('span'); sp.className='spacer'; bar.insertBefore(sp,bar.firstChild); } });
}
function wire(){
  $$('.tab').forEach(t=>t.onclick=()=>goTab(t.dataset.goTab));
  $$('.appbar-back').forEach(b=>b.onclick=()=>back());
  // onboarding → timeline
  const ob=screenEl('onboarding'); if(ob) ob.querySelectorAll('.btn').forEach(b=>{ if(/はじめる|始める/.test(b.textContent)) b.onclick=()=>goTab('timeline'); });
  // timeline: オープン通話/通話募集/部屋カード/参加 → call
  bindText('timeline',['入る','通話','参加'],'call');
  bindClass('timeline','[data-go="call"], .room-strip *',null);
  // circles: カード/参加 → circle詳細
  bindCards('circles','circle'); bindText('circles',['参加','開く'],'circle'); bindClass('circles','.fab','circle');
  bindText('circle',['入る','通話'],'call');
  // chat: 行 → thread
  bindRows('chat',()=> 'chat-thread');
  // profile: 設定 → settings, メッセージ/DM → chat
  const pf=screenEl('profile'); if(pf){ pf.querySelectorAll('.appbar-act').forEach(a=>a.onclick=()=>go('settings'));
    pf.querySelectorAll('.btn').forEach(b=>{ if(/メッセージ|DM|チャット/i.test(b.textContent)) b.onclick=()=>go('chat'); }); }
  // notifications rows
  bindRows('notifications',(t)=> /入室|通話|部屋/.test(t)?'call':(/サークル|招待/.test(t)?'circle':'profile'));
}
function bindText(s,words,dest){ const el=screenEl(s); if(!el) return; el.querySelectorAll('.btn,button').forEach(b=>{ if(words.some(w=>b.textContent.includes(w))) b.onclick=(e)=>{e.stopPropagation(); dest&&go(dest);}; }); }
function bindClass(s,sel,dest){ const el=screenEl(s); if(!el) return; el.querySelectorAll(sel).forEach(x=>x.onclick=()=>dest?go(dest):go('call')); }
function bindCards(s,dest){ const el=screenEl(s); if(!el) return; el.querySelectorAll('.scroll .card, .scroll .group-card, .scroll .GroupCard').forEach(c=>{ c.style.cursor='pointer'; c.addEventListener('click',()=>go(dest)); }); }
function bindRows(s,fn){ const el=screenEl(s); if(!el) return; el.querySelectorAll('.scroll .row').forEach(r=>{ r.style.cursor='pointer'; r.onclick=()=>go(fn(r.textContent)); }); }

balanceAppbars(); wire();
const initS = new URLSearchParams(location.search).get('s');
if(initS && screenEl(initS)){ stack=[initS]; render(initS); }
else if(screenEl('onboarding')){ stack=['onboarding']; render('onboarding'); }
else goTab('timeline');
</script>
</body>
</html>
