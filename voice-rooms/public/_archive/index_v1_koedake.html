<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声だけ</title>
<style>
  /* ── 単色の暗。装飾は足さない。声が surface して減衰する、それだけが動く ── */
  :root {
    /* Emocute 実パレット（Site 横断で確定）に準拠 */
    --void:  #0a0a0a;   /* 背景。単色の純黒近似（Site 基調） */
    --ash:   #121212;   /* かろうじて持ち上げた面 */
    --line:  #1f1f22;
    --bone:  #e8e8e8;   /* 文字。白に寄せる（純白は避ける） */
    --dim:   #8a8d94;   /* 沈んだ灰。本文下限を割らない（~.48） */
    --faint: #55585f;   /* キャプション。可読下限（~.33）。儚さは字間と細さで出す */
    --voice: #ff5e7e;   /* 唯一のアクセント。Emocute のローズ。暗がりにうかぶ声 */
    --voice-soft: #ff8aa3;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--void); color: var(--bone);
    font-family: -apple-system, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    font-weight: 300; letter-spacing: .02em;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; min-height: 100%;
  }
  .wrap { width: 100%; max-width: 560px; margin: 0 auto; padding: 56px 22px 80px; flex: 1; }

  .mincho {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-weight: 400;
  }

  h1 { font-size: 30px; margin: 0; letter-spacing: .14em; }
  .lede { color: var(--dim); font-size: 13px; line-height: 1.9; margin: 18px 0 46px; max-width: 30em; }

  .field { margin-bottom: 30px; }
  .field > label { display: block; font-size: 11px; color: var(--faint); letter-spacing: .18em; margin-bottom: 9px; }
  input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--line);
    color: var(--bone); font-family: inherit; font-weight: 300; font-size: 16px;
    padding: 8px 1px; outline: none; transition: border-color .25s;
  }
  input::placeholder { color: var(--faint); }
  input:focus { border-bottom-color: var(--dim); }

  .line-act { display: flex; gap: 14px; align-items: flex-end; }
  .line-act input { flex: 1; }
  .txtbtn {
    background: none; border: none; color: var(--voice); font-family: inherit; font-weight: 300;
    font-size: 14px; letter-spacing: .12em; cursor: pointer; padding: 8px 2px; white-space: nowrap;
    opacity: .85; transition: opacity .2s;
  }
  .txtbtn:hover { opacity: 1; }

  .roomsec { margin-top: 52px; }
  .roomsec > .cap { font-size: 11px; color: var(--faint); letter-spacing: .18em; margin-bottom: 14px; }
  .rooms { list-style: none; padding: 0; margin: 0; }
  .rooms li {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 15px 2px; border-bottom: 1px solid var(--line); cursor: pointer;
    transition: padding-left .25s, color .2s;
  }
  .rooms li:hover { padding-left: 8px; }
  .rooms li:hover .rname { color: var(--voice); }
  .rname { font-size: 16px; transition: color .2s; }
  .rcount { color: var(--dim); font-size: 12px; letter-spacing: .08em; }
  .empty { color: var(--faint); font-size: 13px; padding: 6px 2px; letter-spacing: .04em; }

  .hint { color: var(--faint); font-size: 11.5px; line-height: 1.95; margin-top: 56px; letter-spacing: .02em; }

  /* ── ルーム ── */
  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 64px; }
  .topbar .rt { flex: 1; font-size: 19px; letter-spacing: .1em; }
  .topbar .rt small { display: block; color: var(--faint); font-size: 11px; letter-spacing: .14em; margin-top: 5px; }
  .iconbtn {
    width: 42px; height: 42px; border: 1px solid var(--line); background: transparent;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: var(--dim); cursor: pointer; padding: 0; transition: color .2s, border-color .2s;
  }
  .iconbtn:hover { color: var(--bone); border-color: var(--faint); }
  .iconbtn.on { color: var(--voice); border-color: var(--voice); }

  /* 声の居合わせ。名も顔もない環。喋ると温度がうかび、黙ると減衰する */
  .field-presence {
    display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
    gap: 38px 44px; padding: 24px 0 40px; min-height: 220px;
  }
  .pres {
    --lvl: 0; position: relative; width: 96px; text-align: center;
    opacity: 0; transition: opacity 1.1s ease;
  }
  .pres.in { opacity: 1; }
  .pres.gone { opacity: 0; }
  .ring {
    width: 66px; height: 66px; margin: 0 auto; border-radius: 50%;
    border: 1px solid var(--faint); position: relative;
    transition: border-color .4s;
  }
  /* surface する声 = 内側に灯る温度。level に比例。黙れば自然に減衰 */
  .ring::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at center, var(--voice), transparent 70%);
    opacity: calc(var(--lvl) * 0.9);
    transform: scale(calc(0.6 + var(--lvl) * 0.5));
    transition: opacity .12s linear, transform .12s linear;
  }
  /* にじみ出る halo。減衰を含めて見せる */
  .ring::after {
    content: ""; position: absolute; inset: -10px; border-radius: 50%;
    box-shadow: 0 0 calc(var(--lvl) * 26px) calc(var(--lvl) * 5px) rgba(255,94,126, calc(var(--lvl) * 0.38));
    transition: box-shadow .18s linear;
  }
  .pres.me .ring { border-color: var(--dim); }
  .pres.muted .ring::before, .pres.muted .ring::after { opacity: 0 !important; box-shadow: none !important; }
  .pres.muted .ring { border-style: dashed; }
  .pname {
    margin-top: 14px; font-size: 12px; color: var(--dim); letter-spacing: .05em;
    word-break: break-all; min-height: 1em;
  }
  .pname.nameless { color: var(--faint); }
  .pstate { margin-top: 4px; font-size: 10px; color: var(--faint); letter-spacing: .14em; }

  .leftnote { text-align: center; color: var(--faint); font-size: 12px; letter-spacing: .08em; margin-top: 40px; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── ロビー ── -->
  <section id="lobby">
    <h1 class="mincho">声だけ</h1>
    <p class="lede">名前も顔もなく、声だけが一時、同じ場所に居合わせる。<br>入口に立ち寄って、聞こえなくなったら去る。</p>

    <div class="field">
      <label>名 — 空でもいい</label>
      <input id="nick" maxlength="24" placeholder="名乗らないままでも">
    </div>

    <div class="field">
      <label>部屋をつくる</label>
      <div class="line-act">
        <input id="newroom" maxlength="40" placeholder="部屋の名">
        <button class="txtbtn" id="createBtn">入る</button>
      </div>
    </div>

    <div class="roomsec">
      <div class="cap">いま ひらいている</div>
      <ul class="rooms" id="roomList"></ul>
      <div class="empty hidden" id="noRooms">まだ どこにも 声はない。</div>
    </div>

    <p class="hint">
      声を出すにはマイクが要る。localhost なら そのまま、別の端末で試すなら HTTPS が要る。<br>
      もう一枚 同じ部屋をひらけば、声は触れあう。
    </p>
  </section>

  <!-- ── ルーム ── -->
  <section id="room" class="hidden">
    <div class="topbar">
      <div class="rt"><span id="roomTitle"></span><small id="roomNote"></small></div>
      <button class="iconbtn" id="muteBtn" title="声を断つ／戻す"></button>
      <button class="iconbtn" id="leaveBtn" title="去る">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 19H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
    <div class="field-presence" id="tiles"></div>
    <div class="leftnote" id="aloneNote">まだ ひとり。声は宙に消える。</div>
  </section>
</div>

<script>
// マイク（声を断つ／戻す）アイコン。SVG のみ、絵文字は使わない
const MIC_ON  = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>';
const MIC_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M9 9v3a3 3 0 0 0 5.1 2.1M15 9.3V4a3 3 0 0 0-5.9-.6"/><path d="M17 16.9A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.1 1.2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>';

const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
const $ = (id) => document.getElementById(id);
const lobby = $('lobby'), roomEl = $('room');

let ws, myId = null, myNick = '';
let localStream = null, muted = false, currentRoom = null;
const pcs = new Map();        // peerId -> RTCPeerConnection
const nicks = new Map();      // peerId -> nick
const audioCtx = window.AudioContext ? new AudioContext() : null;
const meters = new Map();     // key -> { analyser, data, env }  env=減衰つき包絡線

// --- 接続 ---
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onmessage = (e) => handle(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 1000);
}
const wsSend = (o) => { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); };

function handle(msg) {
  switch (msg.type) {
    case 'welcome': myId = msg.id; renderRooms(msg.rooms); break;
    case 'rooms':   renderRooms(msg.rooms); break;
    case 'peers':
      for (const p of msg.peers) { nicks.set(p.id, p.nick); createPeer(p.id, true); addPresence(p.id, p.nick); }
      updateAlone(); break;
    case 'peer-joined':
      nicks.set(msg.id, msg.nick); addPresence(msg.id, msg.nick); updateAlone(); break;
    case 'peer-left': removePeer(msg.id); updateAlone(); break;
    case 'signal': onSignal(msg.from, msg.data); break;
  }
}

// --- ロビー ---
function renderRooms(rooms) {
  const ul = $('roomList'); ul.innerHTML = '';
  $('noRooms').classList.toggle('hidden', rooms.length > 0);
  for (const r of rooms) {
    const li = document.createElement('li');
    li.innerHTML = `<span class="rname">${esc(r.name)}</span><span class="rcount">${r.count} の声</span>`;
    li.onclick = () => joinRoom(r.name);
    ul.appendChild(li);
  }
}
$('createBtn').onclick = () => { const n = $('newroom').value.trim(); if (n) joinRoom(n); };
$('newroom').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('createBtn').click(); });

// --- 入室 ---
async function joinRoom(room) {
  if (!localStream) {
    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); }
    catch (err) { showNote('マイクが断たれている — ' + err.message); return; }
    setupMeter('me', localStream);
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  myNick = $('nick').value.trim();
  currentRoom = room;
  lobby.classList.add('hidden'); roomEl.classList.remove('hidden');
  $('roomTitle').textContent = room;
  $('roomNote').textContent = myNick ? myNick + ' として' : '名もなく';
  $('tiles').innerHTML = '';
  addPresence('me', myNick, true);
  updateAlone();
  wsSend({ type: 'join', room, nick: myNick });
}

$('leaveBtn').onclick = () => {
  wsSend({ type: 'leave' });
  for (const id of [...pcs.keys()]) removePeer(id);
  currentRoom = null;
  roomEl.classList.add('hidden'); lobby.classList.remove('hidden');
};

$('muteBtn').onclick = () => {
  muted = !muted;
  if (localStream) localStream.getAudioTracks().forEach((t) => (t.enabled = !muted));
  $('muteBtn').innerHTML = muted ? MIC_OFF : MIC_ON;
  $('muteBtn').classList.toggle('on', !muted);
  document.querySelector('.pres.me')?.classList.toggle('muted', muted);
};
$('muteBtn').innerHTML = MIC_ON; $('muteBtn').classList.add('on');

function updateAlone() {
  const others = document.querySelectorAll('.pres:not(.me):not(.gone)').length;
  $('aloneNote').classList.toggle('hidden', others > 0);
}
function showNote(t) { $('aloneNote').textContent = t; $('aloneNote').classList.remove('hidden'); }

// --- WebRTC ---
function createPeer(peerId, isInitiator) {
  if (pcs.has(peerId)) return pcs.get(peerId);
  const pc = new RTCPeerConnection(ICE);
  pcs.set(peerId, pc);
  localStream.getTracks().forEach((t) => pc.addTrack(t, localStream));
  pc.onicecandidate = (e) => { if (e.candidate) wsSend({ type: 'signal', to: peerId, data: { candidate: e.candidate } }); };
  pc.ontrack = (e) => {
    let a = document.getElementById('audio-' + peerId);
    if (!a) { a = document.createElement('audio'); a.id = 'audio-' + peerId; a.autoplay = true; document.body.appendChild(a); }
    a.srcObject = e.streams[0];
    setupMeter(peerId, e.streams[0]);
  };
  pc.onconnectionstatechange = () => {
    const st = document.querySelector(`#pres-${peerId} .pstate`);
    if (st) st.textContent = pc.connectionState === 'connected' ? 'とどいている' : '…';
    if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) removePeer(peerId);
  };
  if (isInitiator) {
    pc.onnegotiationneeded = async () => {
      const offer = await pc.createOffer(); await pc.setLocalDescription(offer);
      wsSend({ type: 'signal', to: peerId, data: { sdp: pc.localDescription } });
    };
  }
  return pc;
}
async function onSignal(from, data) {
  let pc = pcs.get(from);
  if (data.sdp) {
    if (!pc) pc = createPeer(from, false);
    await pc.setRemoteDescription(data.sdp);
    if (data.sdp.type === 'offer') {
      const ans = await pc.createAnswer(); await pc.setLocalDescription(ans);
      wsSend({ type: 'signal', to: from, data: { sdp: pc.localDescription } });
    }
  } else if (data.candidate && pc) {
    try { await pc.addIceCandidate(data.candidate); } catch (e) {}
  }
}
// 去る声は、消える前にゆっくり減衰する（即時に消さない）
function removePeer(peerId) {
  const pc = pcs.get(peerId); if (pc) { pc.close(); pcs.delete(peerId); }
  meters.delete(peerId);
  document.getElementById('audio-' + peerId)?.remove();
  const node = document.getElementById('pres-' + peerId);
  if (node) { node.classList.add('gone'); setTimeout(() => node.remove(), 1100); }
}

// --- 居合わせの環 ---
function addPresence(id, nick, isMe = false) {
  const key = isMe ? 'me' : id;
  if (document.getElementById('pres-' + key)) return;
  const nameless = !nick || !nick.trim();
  const label = isMe ? (nameless ? 'あなた（名もなく）' : esc(nick) + '（あなた）')
                     : (nameless ? '名もなく' : esc(nick));
  const div = document.createElement('div');
  div.id = 'pres-' + key;
  div.className = 'pres' + (isMe ? ' me' : '');
  div.innerHTML = `<div class="ring"></div>
    <div class="pname${nameless ? ' nameless' : ''}">${label}</div>
    <div class="pstate">${isMe ? 'ここにいる' : 'たどりつこうとしている'}</div>`;
  $('tiles').appendChild(div);
  requestAnimationFrame(() => div.classList.add('in'));  // 静かに surface
}

// --- 声の検出。attack 速く release 遅く＝減衰を見せる ---
function setupMeter(key, stream) {
  if (!audioCtx) return;
  try {
    const src = audioCtx.createMediaStreamSource(stream);
    const an = audioCtx.createAnalyser(); an.fftSize = 512;
    src.connect(an);
    meters.set(key, { analyser: an, data: new Uint8Array(an.frequencyBinCount), env: 0 });
  } catch (e) {}
}
function tick() {
  for (const [key, m] of meters) {
    m.analyser.getByteTimeDomainData(m.data);
    let s = 0; for (let i = 0; i < m.data.length; i++) { const v = (m.data[i] - 128) / 128; s += v * v; }
    let rms = Math.sqrt(s / m.data.length);
    rms = Math.min(1, Math.max(0, (rms - 0.012) * 7));     // ノイズ床を引いて正規化
    if (key === 'me' && muted) rms = 0;
    m.env = rms > m.env ? rms : m.env * 0.9 + rms * 0.1;    // 速く灯り、ゆっくり減衰
    const node = document.getElementById('pres-' + key);
    if (node) node.style.setProperty('--lvl', m.env.toFixed(3));
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
connect();
</script>
</body>
</html>
