<style>
/* ── chat: 会話一覧 ── */
[data-screen="chat"] .chat-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line2);
  cursor: pointer;
}
[data-screen="chat"] .chat-row:active {
  background: var(--surface2);
}
[data-screen="chat"] .chat-row-body {
  flex: 1;
  min-width: 0;
}
[data-screen="chat"] .chat-row-top {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
[data-screen="chat"] .chat-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--fg);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
[data-screen="chat"] .chat-time {
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
}
[data-screen="chat"] .chat-preview {
  font-size: 12px;
  color: var(--mut);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 3px;
}
[data-screen="chat"] .chat-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
}
[data-screen="chat"] .unread-badge {
  background: var(--rose);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 99px;
  min-width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
}

/* ── chat-thread: スレッド ── */
[data-screen="chat-thread"] {
  display: flex;
  flex-direction: column;
  height: 100%;
}
[data-screen="chat-thread"] .scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 80px;
}
[data-screen="chat-thread"] .date-sep {
  text-align: center;
  font-size: 11px;
  color: var(--dim);
  margin: 16px 0 12px;
  position: relative;
}
[data-screen="chat-thread"] .date-sep::before,
[data-screen="chat-thread"] .date-sep::after {
  content: "";
  position: absolute;
  top: 50%;
  width: calc(50% - 36px);
  height: 1px;
  background: var(--line);
}
[data-screen="chat-thread"] .date-sep::before { left: 0; }
[data-screen="chat-thread"] .date-sep::after  { right: 0; }

[data-screen="chat-thread"] .bubble {
  max-width: 74%;
  background: var(--surface2);
  border: 1px solid var(--line);
  border-radius: 16px 16px 16px 4px;
  padding: 9px 13px;
  font-size: 13px;
  color: var(--fg);
  line-height: 1.55;
  margin-bottom: 8px;
  align-self: flex-start;
}
[data-screen="chat-thread"] .bubble.me {
  background: var(--rose-dim);
  border-color: color-mix(in srgb, var(--rose) 35%, transparent);
  border-radius: 16px 16px 4px 16px;
  align-self: flex-end;
  color: var(--fg);
}
[data-screen="chat-thread"] .bubble-wrap {
  display: flex;
  flex-direction: column;
}

[data-screen="chat-thread"] .input-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: var(--surface);
  border-top: 1px solid var(--line);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-sizing: border-box;
  z-index: 20;
}
[data-screen="chat-thread"] .input-bar .input {
  flex: 1;
  font-size: 14px;
  padding: 9px 14px;
  min-height: unset;
  line-height: 1.4;
}
[data-screen="chat-thread"] .send-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--rose);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  flex-shrink: 0;
}
[data-screen="chat-thread"] .send-btn:active {
  opacity: 0.8;
}
</style>

<!-- ────────────────────────────────────────
     (A) チャット会話一覧
     ──────────────────────────────────────── -->

<!-- ────────────────────────────────────────
