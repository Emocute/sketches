<style>
[data-screen="notifications"] .notif-row {
  position: relative;
  align-items: flex-start;
  padding: 12px 14px 12px 14px;
  gap: 10px;
}
[data-screen="notifications"] .notif-row .dot.rose {
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  flex-shrink: 0;
}
[data-screen="notifications"] .notif-avatar-wrap {
  position: relative;
  flex-shrink: 0;
}
[data-screen="notifications"] .notif-type-badge {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1.5px solid var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
[data-screen="notifications"] .notif-type-badge.type-like {
  color: var(--rose);
}
[data-screen="notifications"] .notif-type-badge.type-follow {
  color: var(--ok);
}
[data-screen="notifications"] .notif-type-badge.type-gift {
  color: var(--gold);
}
[data-screen="notifications"] .notif-type-badge.type-enter {
  color: var(--mut);
}
[data-screen="notifications"] .notif-type-badge.type-invite {
  color: var(--gold);
}
[data-screen="notifications"] .notif-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
[data-screen="notifications"] .notif-text {
  margin: 0;
  font-size: 13px;
  color: var(--mut);
  line-height: 1.5;
}
[data-screen="notifications"] .notif-text .name {
  color: var(--fg);
  font-weight: 600;
}
[data-screen="notifications"] .notif-row.unread .notif-text {
  color: var(--fg);
}
[data-screen="notifications"] .notif-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 2px;
}
[data-screen="notifications"] .notif-time {
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
  white-space: nowrap;
}
[data-screen="notifications"] .notif-thumb {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  background: var(--surface2);
  flex-shrink: 0;
  align-self: center;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--dim);
  font-size: 10px;
}
[data-screen="notifications"] .follow-btn-wrap {
  flex-shrink: 0;
  align-self: center;
}
</style>

<section class="screen" data-screen="notifications" data-tab="notifications">

  <div class="appbar">
    <span class="appbar-title">通知</span>
    <button class="appbar-act" aria-label="すべて既読にする">

        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </button>
  </div>

  <div class="seg-tabs">
    <button class="seg-tab on">すべて</button>
    <button class="seg-tab">あなた宛</button>
  </div>

  <div class="scroll">

    <p class="section-lbl">今日</p>

    <!-- フォロー（未読） -->

      <span class="dot rose"></span>
      <div class="notif-avatar-wrap">
        <div class="user-icon sm">さ</div>
        <div class="notif-type-badge type-follow">

            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>

            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
      </div>
      <div class="notif-body">
        <p class="notif-text"><span class="name">さく</span> があなたをフォローしました</p>
        <div class="notif-meta">
          <span class="notif-time">3分前</span>
        </div>
      </div>
      <div class="follow-btn-wrap">
        <button class="btn mini">フォロー</button>
      </div>
    </div>

    <!-- いいね（未読） -->
    <div class="row notif-row unread">
      <span class="dot rose"></span>
      <div class="notif-avatar-wrap">
        <div class="user-icon sm">み</div>
        <div class="notif-type-badge type-like">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>
      </div>
      <div class="notif-body">
        <p class="notif-text"><span class="name">みお</span> があなたの投稿にいいねしました</p>
        <div class="notif-meta">
          <span class="notif-time">17分前</span>
        </div>
      </div>
      <div class="notif-thumb">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>

    </div>

        <div class="user-icon sm">r</div>

            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>

      <div class="notif-body">

    <!-- サークル招待（未読） -->

        <div class="notif-meta">

      <div class="follow-btn-wrap">

    <!-- ギフト（既読） -->
    <div class="row notif-row">
      <div class="notif-avatar-wrap">
        <div class="user-icon sm" style="background:var(--rose-dim);color:var(--rose);">名</div>
        <div class="notif-type-badge type-gift">

            <polyline points="20 12 20 22 4 22 4 12"/>

        <p class="notif-text"><span class="name">名なし</span> がギフトを送りました</p>
        <div class="notif-meta">
          <span class="notif-time">3時間前</span>

    <p class="section-lbl">以前</p>

    <!-- いいね 複数（既読） -->
    <div class="row notif-row">
      <div class="notif-avatar-wrap">
        <div class="user-icon sm">n</div>
        <div class="notif-type-badge type-like">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

          </svg>
        </div>
      </div>
      <div class="notif-body">
        <p class="notif-text"><span class="name">nxmeless</span> と他3人があなたの投稿にいいねしました</p>
        <div class="notif-meta">

    <!-- フォロー（既読） -->
    <div class="row notif-row">
      <div class="notif-avatar-wrap">
        <div class="user-icon sm">ao</div>
        <div class="notif-type-badge type-follow">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>

            <line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
      </div>
      <div class="notif-body">
        <p class="notif-text"><span class="name">ao_noise</span> があなたをフォローしました</p>
        <div class="notif-meta">
          <span class="notif-time">3日前</span>
        </div>
      </div>
      <div class="follow-btn-wrap">
        <button class="btn ghost mini">フォロー中</button>
      </div>
    </div>

    <!-- ギフト 以前（既読） -->
    <div class="row notif-row">
      <div class="notif-avatar-wrap">
        <div class="user-icon sm">lo</div>
        <div class="notif-type-badge type-gift">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 12 20 22 4 22 4 12"/>
            <rect x="2" y="7" width="20" height="5"/>
            <line x1="12" y1="22" x2="12" y2="7"/>
            <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
            <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
          </svg>
        </div>
      </div>
      <div class="notif-body">
        <p class="notif-text"><span class="name">lo-fi廃人</span> がギフトを送りました</p>
        <div class="notif-meta">
          <span class="notif-time">4日前</span>
        </div>

    </div>

    <!-- 入室 以前（既読） -->
    <div class="row notif-row">
      <div class="notif-avatar-wrap">
        <div class="user-icon sm">r</div>
        <div class="notif-type-badge type-enter">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>

</section>
