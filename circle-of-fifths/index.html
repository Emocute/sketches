<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle of Fifths Playground — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{--bg:#0e0e12;--panel:#16161d;--ink:#e9e9f0;--dim:#8a8a99;--accent:#c9a86a;--accent2:#6a9ec9;--line:#26262f;--path:#c96a9e;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.5;padding:24px;max-width:980px;margin:0 auto;text-align:center}
  h1{font-size:20px;font-weight:600}h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 16px}
  .wrap{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  #circle{max-width:460px;width:100%}
  button svg{width:13px;height:13px;vertical-align:-2px}
  .node circle{cursor:pointer;transition:.15s}
  .node:hover circle{stroke:var(--accent)}
  .node text{pointer-events:none;font-size:15px;font-weight:600;fill:var(--ink)}
  .node.minor text{font-size:11px;fill:var(--dim)}
  .node.selmaj circle{stroke:#fff;stroke-width:2.5}
  .node.selmin circle{stroke:var(--accent2);stroke-width:2.5}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;min-width:250px;text-align:left}
  .panel h2{font-size:16px;color:var(--accent);margin-bottom:2px}
  .panel .sig{font-size:12px;color:var(--accent2);margin-bottom:4px;font-family:ui-monospace,Menlo,monospace}
  .panel .rel{font-size:12px;color:var(--dim);margin-bottom:12px}
  .modetog{display:flex;gap:6px;margin-bottom:12px}
  .modetog button{flex:1;background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px;cursor:pointer;font-family:inherit;font-size:13px}
  .modetog button.on{background:var(--accent2);color:#06121d;border-color:var(--accent2)}
  .dia{display:flex;flex-direction:column;gap:6px}
  .dia button{display:flex;justify-content:space-between;align-items:center;background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 13px;cursor:pointer;font-family:inherit}
  .dia button:hover{border-color:var(--accent)}
  .dia .deg{font-family:ui-monospace,Menlo,monospace;color:var(--accent2);font-size:13px}
  .dia .nm{font-weight:600}
  .playall{margin-top:12px;width:100%;background:var(--accent);color:#1a1206;border:none;border-radius:8px;padding:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
  .trace{margin-top:14px}
  .trace label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
  .trace input{width:100%;background:#1d1d26;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:ui-monospace,Menlo,monospace;font-size:13px}
  .trace .hint{font-size:11px;color:var(--dim);margin-top:6px}
  .status{font-size:11px;color:var(--dim);margin:10px 0;text-align:center}.status b{color:#6ac98f}
  .footer{margin-top:18px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px;text-align:left}
  .footer code{background:#1d1d26;padding:1px 5px;border-radius:4px;font-size:11px}

/* ---- design language v2 (rolled-in, 後勝ちで標準トークンを上書き / toy固有変数は温存) ---- */
:root{--bg:#0b0b0f;--bg2:#0f0f15;--panel:#15151c;--surface2:#1b1b24;
 --ink:#ececf2;--dim:#8c8c9a;--line:#262630;
 --accent:#cfac6e;--accent-soft:#e0c894;--accent2:#6fa3cf;--good:#6fc996;--warn:#cf6f6f;
 --radius:14px;--radius-sm:9px;--ease:cubic-bezier(.2,.7,.3,1);}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{background:radial-gradient(120% 80% at 50% -10%, #16131c 0%, var(--bg2) 38%, var(--bg) 75%) fixed;
 font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Segoe UI",sans-serif}
button,select,input{transition:border-color .18s var(--ease),transform .18s var(--ease),box-shadow .18s var(--ease),background .18s var(--ease)}
button:focus-visible,select:focus-visible,input:focus-visible{outline:none;box-shadow:0 0 0 2px rgba(207,172,110,.5);border-color:var(--accent)}
button:hover{border-color:var(--accent)}
::-webkit-scrollbar{width:11px;height:11px}::-webkit-scrollbar-thumb{background:#26262f;border-radius:8px;border:3px solid transparent;background-clip:content-box}
.dia button{transition:border-color .18s var(--ease),transform .18s var(--ease)}.dia button:hover{transform:translateY(-1px)}
</style>
</head>
<body>
  <h1>Circle of Fifths <span class="sub">隣どうしは、近い調。</span></h1>
  <p class="tagline">キーをクリックで和音が鳴る。進行を入れると、五度圏の上をどう旅するかが線になる。</p>
  <div class="wrap">
    <svg id="circle" viewBox="0 0 460 460"></svg>
    <div class="panel">
      <div class="modetog"><button id="mMaj" class="on">Major</button><button id="mMin">minor</button></div>
      <h2 id="keyName">C major</h2>
      <div class="sig" id="sig"></div>
      <div class="rel" id="rel"></div>
      <div class="dia" id="dia"></div>
      <button class="playall" id="playAll"><svg viewBox="0 0 12 12" width="12" height="12" style="vertical-align:-1px"><path d="M3 2.2v7.6L9.5 6z" fill="currentColor"/></svg> 全和音を順に鳴らす</button>
      <div class="trace">
        <label>進行を圏上に描く（度数）</label>
        <input id="prog" value="Imaj7 VIm7 IIm7 V7" spellcheck="false">
        <div class="hint" id="hint"></div>
      </div>
    </div>
  </div>
  <div class="status" id="status">音源を読み込み中…（三角波で代用中）</div>
  <div class="footer">
    度数 = メジャースケール準拠（Studio v7）。内側＝平行短調。調号は <code>sig</code>（♯/♭ の数）。<br>
    進行の軌跡（ピンク線）が短いほど近親調内、長く飛ぶほど遠隔転調。番号＝進行順。
  </div>
<script>
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FIFTHS=[0,7,2,9,4,11,6,1,8,3,10,5];
const MAJ=[0,2,4,5,7,9,11];
const DIA_MAJ=[["I","maj7",[0,4,7,11]],["ii","m7",[0,3,7,10]],["iii","m7",[0,3,7,10]],["IV","maj7",[0,4,7,11]],["V","7",[0,4,7,10]],["vi","m7",[0,3,7,10]],["vii°","m7b5",[0,3,6,10]]];
// 自然短音階のダイアトニック（i ii° ♭III iv v ♭VI ♭VII）— degree は平行メジャー基準の半音
const DIA_MIN=[["i","m7",[0,3,7,10],9],["ii°","m7b5",[0,3,6,10],11],["♭III","maj7",[0,4,7,11],0],["iv","m7",[0,3,7,10],2],["v","m7",[0,3,7,10],4],["♭VI","maj7",[0,4,7,11],5],["♭VII","7",[0,4,7,10],7]];
// 調号（♯ +, ♭ −）by major pc
const SIG={0:0,7:1,2:2,9:3,4:4,11:5,6:6,1:-5,8:-4,3:-3,10:-2,5:-1};
function sigText(pc){const n=SIG[pc]??0;if(n===0)return"調号なし (0)";return n>0?`♯ ×${n}`:`♭ ×${-n}`;}
let curPc=0, mode="maj";
const NUM={I:0,II:2,III:4,IV:5,V:7,VI:9,VII:11};
const NUM_REV=["I","♭II","II","♭III","III","IV","♭V","V","♭VI","VI","♭VII","VII"];

const svg=document.getElementById("circle");
const CX=230,CY=230,R=180,r2=128;
function pol(cx,cy,rad,deg){const a=(deg-90)*Math.PI/180;return [cx+rad*Math.cos(a),cy+rad*Math.sin(a)];}
function nodeAngleForPc(pc){const i=FIFTHS.indexOf(((pc%12)+12)%12);return i*30;}

function buildCircle(){
  let h=`<g id="trace"></g>`;
  FIFTHS.forEach((pc,i)=>{
    const [x,y]=pol(CX,CY,R,i*30);
    const selMaj=(mode==="maj"&&pc===curPc);
    h+=`<g class="node ${selMaj?'selmaj':''}" data-pc="${pc}" data-kind="maj"><circle cx="${x}" cy="${y}" r="27" fill="#1d1d26" stroke="#26262f" stroke-width="1.5"/><text x="${x}" y="${y+5}" text-anchor="middle">${NOTE[pc]}</text></g>`;
    const minPc=(pc+9)%12;
    const [mx,my]=pol(CX,CY,r2,i*30);
    const selMin=(mode==="min"&&minPc===curPc);
    h+=`<g class="node minor ${selMin?'selmin':''}" data-pc="${minPc}" data-kind="min"><circle cx="${mx}" cy="${my}" r="18" fill="#15151b" stroke="#26262f" stroke-width="1"/><text x="${mx}" y="${my+4}" text-anchor="middle">${NOTE[minPc]}m</text></g>`;
  });
  svg.innerHTML=h;
  svg.querySelectorAll(".node").forEach(g=>g.addEventListener("click",()=>{mode=g.dataset.kind;document.getElementById("mMaj").classList.toggle("on",mode==="maj");document.getElementById("mMin").classList.toggle("on",mode==="min");selectKey(+g.dataset.pc);}));
}
function dia(){return mode==="maj"?DIA_MAJ:DIA_MIN;}
function tonicMajPcForDeg(){ // 度数解釈の基準（minor は平行メジャーの主音）
  return mode==="maj"?curPc:((curPc+3)%12);
}
function selectKey(pc){
  curPc=pc;
  document.getElementById("keyName").textContent=NOTE[pc]+(mode==="maj"?" major":" minor");
  const majBasis=tonicMajPcForDeg();
  document.getElementById("sig").textContent="調号: "+sigText(majBasis);
  document.getElementById("rel").textContent=mode==="maj"
    ? "平行短調: "+NOTE[(pc+9)%12]+" minor　近親調: "+NOTE[(pc+7)%12]+", "+NOTE[(pc+5)%12]
    : "平行長調: "+NOTE[(pc+3)%12]+" major";
  const d=document.getElementById("dia");d.innerHTML="";
  dia().forEach((row)=>{
    const [deg,q,iv,degSemi]=row;
    const root=mode==="maj"?(pc+MAJ[dia().indexOf(row)])%12:(majBasis+degSemi)%12;
    const b=document.createElement("button");
    b.innerHTML=`<span class="nm">${NOTE[root]}${q==="maj7"?"△7":q==="m7"?"m7":q==="7"?"7":"ø7"}</span><span class="deg">${deg}</span>`;
    b.onclick=()=>playChord(root,iv);
    d.appendChild(b);
  });
  buildCircle();drawTrace();
}
document.getElementById("mMaj").onclick=()=>{if(mode!=="maj"){mode="maj";document.getElementById("mMaj").classList.add("on");document.getElementById("mMin").classList.remove("on");selectKey(curPc);}};
document.getElementById("mMin").onclick=()=>{if(mode!=="min"){mode="min";document.getElementById("mMin").classList.add("on");document.getElementById("mMaj").classList.remove("on");selectKey(curPc);}};

// 進行軌跡
function drawTrace(){
  const g=document.getElementById("trace");if(!g)return;
  const str=document.getElementById("prog").value.trim();
  const basis=tonicMajPcForDeg();
  const toks=str.split(/\s+/).filter(Boolean);
  const pts=[];
  for(const t of toks){
    const m=t.match(/^([b#♭♯]?)([IViv]+)/);if(!m)continue;
    let acc=m[1],num=m[2].toUpperCase();if(!(num in NUM))continue;
    let pc=NUM[num];if(acc==="b"||acc==="♭")pc--;if(acc==="#"||acc==="♯")pc++;
    const rootPc=((basis+pc)%12+12)%12;
    const [x,y]=pol(CX,CY,R,nodeAngleForPc(rootPc));
    pts.push([x,y,rootPc]);
  }
  let h="";
  for(let i=1;i<pts.length;i++)
    h+=`<line x1="${pts[i-1][0]}" y1="${pts[i-1][1]}" x2="${pts[i][0]}" y2="${pts[i][1]}" stroke="var(--path)" stroke-width="2" opacity="0.8"/>`;
  pts.forEach((p,i)=>{h+=`<circle cx="${p[0]}" cy="${p[1]}" r="9" fill="var(--path)"/><text x="${p[0]}" y="${p[1]+3.5}" text-anchor="middle" font-size="10" font-weight="700" fill="#1a0612">${i+1}</text>`;});
  g.innerHTML=h;
  // 移動距離（五度圏ステップ合計）
  let steps=0;for(let i=1;i<pts.length;i++){let a=FIFTHS.indexOf(pts[i-1][2]),b=FIFTHS.indexOf(pts[i][2]);let d=Math.abs(a-b);steps+=Math.min(d,12-d);}
  document.getElementById("hint").textContent=pts.length>1?`五度圏ステップ移動量: ${steps}（小さいほど近親調内に収まる）`:"";
}
document.getElementById("prog").addEventListener("input",drawTrace);

// 音源
let sampler=null,fb=null,ready=false;
fb=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},envelope:{attack:.01,decay:.3,sustain:.4,release:1.1}}).toDestination();fb.volume.value=-12;
function initSampler(){sampler=new Tone.Sampler({urls:{A2:"A2.mp3",C3:"C3.mp3","D#3":"Ds3.mp3","F#3":"Fs3.mp3",A3:"A3.mp3",C4:"C4.mp3","D#4":"Ds4.mp3","F#4":"Fs4.mp3",A4:"A4.mp3",C5:"C5.mp3"},
  baseUrl:"https://tonejs.github.io/audio/salamander/",onload:()=>{ready=true;document.getElementById("status").innerHTML="音源: <b>Salamander Grand Piano</b> 読込完了。";},
  onerror:()=>{document.getElementById("status").textContent="音源読込に失敗 — 三角波で代用中。";}}).toDestination();sampler.volume.value=-6;}
function vo(){return (ready&&sampler)?sampler:fb;}
function midiToNote(m){return NOTE[((m%12)+12)%12]+(Math.floor(m/12)-1);}
async function playChord(root,iv){await Tone.start();if(!sampler)initSampler();vo().triggerAttackRelease(iv.map(x=>midiToNote(60+root+x)),1.0,Tone.now());}
document.getElementById("playAll").onclick=async()=>{await Tone.start();if(!sampler)initSampler();const v=vo();let t=Tone.now();
  const basis=tonicMajPcForDeg();
  dia().forEach((row)=>{const [deg,q,iv,degSemi]=row;const root=mode==="maj"?(curPc+MAJ[dia().indexOf(row)])%12:(basis+degSemi)%12;
    v.triggerAttackRelease(iv.map(x=>midiToNote(60+root+x)),0.7,t);t+=0.8;});};
buildCircle();selectKey(0);
</script>
</body>
</html>
