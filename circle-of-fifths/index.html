<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle of Fifths Playground — Emocute</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  :root{--bg:#0e0e12;--panel:#16161d;--ink:#e9e9f0;--dim:#8a8a99;
    --accent:#c9a86a;--accent2:#6a9ec9;--line:#26262f;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    line-height:1.5;padding:24px;max-width:920px;margin:0 auto;text-align:center}
  h1{font-size:20px;font-weight:600}
  h1 .sub{color:var(--dim);font-weight:400;font-size:13px;margin-left:10px}
  .tagline{color:var(--dim);font-size:13px;margin:6px 0 18px}
  .wrap{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  svg{max-width:440px;width:100%}
  .node circle{cursor:pointer;transition:.15s}
  .node:hover circle{stroke:var(--accent)}
  .node text{pointer-events:none;font-size:15px;font-weight:600;fill:var(--ink)}
  .node.minor text{font-size:11px;fill:var(--dim)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;
    min-width:240px;text-align:left}
  .panel h2{font-size:16px;color:var(--accent);margin-bottom:4px}
  .panel .rel{font-size:12px;color:var(--dim);margin-bottom:14px}
  .dia{display:flex;flex-direction:column;gap:6px}
  .dia button{display:flex;justify-content:space-between;align-items:center;background:#1d1d26;
    color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 13px;cursor:pointer;font-family:inherit}
  .dia button:hover{border-color:var(--accent)}
  .dia .deg{font-family:ui-monospace,Menlo,monospace;color:var(--accent2);font-size:13px}
  .dia .nm{font-weight:600}
  .playall{margin-top:12px;width:100%;background:var(--accent);color:#1a1206;border:none;
    border-radius:8px;padding:10px;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
  .footer{margin-top:20px;color:var(--dim);font-size:12px;border-top:1px solid var(--line);padding-top:14px;text-align:left}
</style>
</head>
<body>
  <h1>Circle of Fifths <span class="sub">隣どうしは、近い調。</span></h1>
  <p class="tagline">キーをクリックすると、その調の和音が並んで鳴る。時計回りに完全五度、内側に平行短調。</p>
  <div class="wrap">
    <svg id="circle" viewBox="0 0 440 440"></svg>
    <div class="panel">
      <h2 id="keyName">C major</h2>
      <div class="rel" id="rel"></div>
      <div class="dia" id="dia"></div>
      <button class="playall" id="playAll">▶ 全和音を順に鳴らす</button>
    </div>
  </div>
  <div class="footer">
    度数 = メジャースケール準拠（Studio v7）。発音は Tone.js（ブラウザ完結）。各キー内側ノード＝平行短調（vi）。<br>
    ダイアトニック和音 quality は I=maj7 ii=m7 iii=m7 IV=maj7 V=7 vi=m7 vii=m7♭5。
  </div>
<script>
const NOTE=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FIFTHS=[0,7,2,9,4,11,6,1,8,3,10,5]; // C G D A E B F# C# G# D# A# F
const MAJ=[0,2,4,5,7,9,11];
const DIA=[["I","maj7",[0,4,7,11]],["ii","m7",[0,3,7,10]],["iii","m7",[0,3,7,10]],
  ["IV","maj7",[0,4,7,11]],["V","7",[0,4,7,10]],["vi","m7",[0,3,7,10]],["vii°","m7b5",[0,3,6,10]]];
let curKey=0;

const svg=document.getElementById("circle");
const CX=220,CY=220,R=170,r2=120;
function pol(cx,cy,rad,deg){const a=(deg-90)*Math.PI/180;return [cx+rad*Math.cos(a),cy+rad*Math.sin(a)];}
function buildCircle(){
  let h="";
  FIFTHS.forEach((pc,i)=>{
    const [x,y]=pol(CX,CY,R,i*30);
    h+=`<g class="node" data-pc="${pc}"><circle cx="${x}" cy="${y}" r="26" fill="#1d1d26" stroke="#26262f" stroke-width="1.5"/>`+
       `<text x="${x}" y="${y+5}" text-anchor="middle">${NOTE[pc]}</text></g>`;
    // 平行短調（内側）
    const minPc=(pc+9)%12;
    const [mx,my]=pol(CX,CY,r2,i*30);
    h+=`<g class="node minor" data-pc="${pc}"><circle cx="${mx}" cy="${my}" r="17" fill="#15151b" stroke="#26262f" stroke-width="1"/>`+
       `<text x="${mx}" y="${my+4}" text-anchor="middle">${NOTE[minPc]}m</text></g>`;
  });
  svg.innerHTML=h;
  svg.querySelectorAll(".node").forEach(g=>g.addEventListener("click",()=>selectKey(+g.dataset.pc)));
}
function selectKey(pc){
  curKey=pc;
  document.getElementById("keyName").textContent=NOTE[pc]+" major";
  document.getElementById("rel").textContent="平行短調: "+NOTE[(pc+9)%12]+" minor　/　近親調: "+NOTE[(pc+7)%12]+", "+NOTE[(pc+5)%12];
  const dia=document.getElementById("dia"); dia.innerHTML="";
  DIA.forEach(([deg,q,iv],di)=>{
    const root=(pc+MAJ[di])%12;
    const b=document.createElement("button");
    b.innerHTML=`<span class="nm">${NOTE[root]}${q==="maj7"?"△7":q==="m7"?"m7":q==="7"?"7":"ø7"}</span><span class="deg">${deg}</span>`;
    b.onclick=()=>playChord(root,iv);
    dia.appendChild(b);
  });
}
let synth=null;
function ensure(){if(synth)return;synth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},
  envelope:{attack:.01,decay:.3,sustain:.4,release:1.1}}).toDestination();synth.volume.value=-11;}
function fr(m){return 440*Math.pow(2,(m-69)/12);}
async function playChord(root,iv){await Tone.start();ensure();
  synth.triggerAttackRelease(iv.map(x=>fr(60+root+x)),1.0,Tone.now());}
document.getElementById("playAll").onclick=async()=>{
  await Tone.start();ensure();let t=Tone.now();
  DIA.forEach(([d,q,iv],di)=>{const root=(curKey+MAJ[di])%12;
    synth.triggerAttackRelease(iv.map(x=>fr(60+root+x)),0.7,t);t+=0.8;});
};
buildCircle();selectKey(0);
</script>
</body>
</html>
